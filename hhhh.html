    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        #root {
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.86)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .35
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-55px)
            }
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.13)
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes swipeLeft {
            to {
                opacity: 0;
                transform: translateX(-120%) rotate(-20deg)
            }
        }

        @keyframes swipeRight {
            to {
                opacity: 0;
                transform: translateX(120%) rotate(20deg)
            }
        }
    </style>
</head>

        // ── ONBOARDING ────────────────────────────────────────────────────────
        function Onboarding({ th, onComplete }) {
            const [step, setStep] = React.useState(0);
            const [data, setData] = React.useState({ name: "", logo: "⚽", city: "", district: "", level: "Orta", players: "8", avail: [], desc: "" });
            const [err, setErr] = React.useState("");
            const dists = GEO[data.city] || [];
            function next() {
                if (step === 0 && !data.name.trim()) { setErr("Takım adı zorunlu"); return; }
                if (step === 1 && !data.city) { setErr("Şehir seçmelisin"); return; }
                if (step === 1 && !data.district) { setErr("İlçe seçmelisin"); return; }
                if (step === 2 && data.avail.length === 0) { setErr("En az bir gün seçmelisin"); return; }
                setErr("");
                if (step < 3) setStep(s => s + 1);
                else onComplete({ id: 0, name: data.name.trim(), city: data.city, district: data.district, logo: data.logo, level: data.level, players: data.players, avail: data.avail, desc: data.desc.trim(), wins: 0, losses: 0, draws: 0, points: 0, played: 0, rating: 0, isPremium: false });

            function toggleDay(d) { setData(p => ({ ...p, avail: p.avail.includes(d) ? p.avail.filter(x => x !== d) : [...p.avail, d] })); }
            const steps = ["Takım Adı", "Konum", "Müsaitlik", "Hazır!"];
            const prog = (step / (steps.length - 1)) * 100;
            const S = { background: "#0d0d0d", border: "1px solid #1a1a1a", borderRadius: 12, padding: "14px 16px", color: "#fff", fontSize: 14, outline: "none", fontFamily: "'Outfit',sans-serif", width: "100%" };
            return (
                <div style={{ width: "100%", maxWidth: 430, height: "100dvh", margin: "0 auto", background: "#000", display: "flex", flexDirection: "column", overflow: "hidden" }}>
                    <div style={{ padding: "20px 20px 0", flexShrink: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 26, letterSpacing: 3, color: "#fff" }}>FUT<span style={{ color: "#F5F234" }}>MATCH</span></div>
                            <div style={{ flex: 1 }} />
                            <div style={{ color: "#555", fontSize: 12 }}>{step + 1}/{steps.length}</div>
                        </div>
                        <div style={{ height: 3, background: "#1a1a1a", borderRadius: 2, marginBottom: 6 }}>
                            <div style={{ height: "100%", width: `${prog}%`, background: "linear-gradient(90deg,#F5F234,#fff)", borderRadius: 2, transition: "width .4s ease" }} />
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 0 }}>
                            {steps.map((s, i) => <div key={s} style={{ fontSize: 9, color: i <= step ? "#F5F234" : "#333", fontWeight: 700, letterSpacing: 1 }}>{s.toUpperCase()}</div>)}
                        </div>
                    </div>
                    <div style={{ flex: 1, overflowY: "auto", padding: "24px 20px 20px" }}>
                        {step === 0 && (
                            <div style={{ animation: "fadeUp .4s ease" }}>
                                <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 40, color: "#fff", lineHeight: 1, marginBottom: 6 }}>TAKIM OLUŞTUR</div>
                                <div style={{ color: "#555", fontSize: 13, marginBottom: 28 }}>Takımını tanıt. Bu bilgiler rakiplerine görünür.</div>
                                <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>TAKIM ADI</div>
                                <input value={data.name} onChange={e => setData(p => ({ ...p, name: e.target.value }))} placeholder="örn. Kadıköy Lions FC" maxLength={30} style={{ ...S, marginBottom: 4 }} autoFocus />
                                <div style={{ color: "#333", fontSize: 10, textAlign: "right", marginBottom: 24 }}>{data.name.length}/30</div>
                                <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 12 }}>TAKIM LOGOSU</div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 }}>
                                    {LOGOS.map(l => <button key={l} onClick={() => setData(p => ({ ...p, logo: l }))} style={{ width: 48, height: 48, borderRadius: 12, border: `2px solid ${data.logo === l ? "#F5F234" : "#1a1a1a"}`, background: data.logo === l ? "rgba(245,242,52,.12)" : "#0d0d0d", fontSize: 24, cursor: "pointer", transition: "all .15s" }}>{l}</button>)}
                                </div>
                                <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>SEVİYE</div>
                                <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
                                    {LEVELS.map(l => <button key={l} onClick={() => setData(p => ({ ...p, level: l }))} style={{ flex: 1, padding: "10px 4px", borderRadius: 12, border: `1px solid ${data.level === l ? "#F5F234" : "#1a1a1a"}`, background: data.level === l ? "rgba(245,242,52,.1)" : "#0d0d0d", color: data.level === l ? "#F5F234" : "#555", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{l}</button>)}
                                </div>
                                <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>OYUNCU SAYISI</div>
                                <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
                                    {["6", "7", "8", "9", "10", "11", "12"].map(n => <button key={n} onClick={() => setData(p => ({ ...p, players: n }))} style={{ flex: 1, padding: "10px 4px", borderRadius: 10, border: `1px solid ${data.players === n ? "#F5F234" : "#1a1a1a"}`, background: data.players === n ? "rgba(245,242,52,.1)" : "#0d0d0d", color: data.players === n ? "#F5F234" : "#555", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{n}</button>)}
                                </div>
                                <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>TAKIM TANITIMI <span style={{ color: "#333" }}>(İsteğe Bağlı)</span></div>
                                <textarea value={data.desc} onChange={e => setData(p => ({ ...p, desc: e.target.value }))} placeholder="Takımınızı kısaca tanıtın..." maxLength={200} rows={3} style={{ ...S, resize: "none", lineHeight: 1.6 }} />
                                <div style={{ color: "#333", fontSize: 10, textAlign: "right", marginTop: 4 }}>{data.desc.length}/200</div>
                            </div>
                        )}
                        {step === 1 && (
                            <div style={{ animation: "fadeUp .4s ease" }}>
                                <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 40, color: "#fff", lineHeight: 1, marginBottom: 6 }}>KONUM</div>
                                <div style={{ color: "#555", fontSize: 13, marginBottom: 28 }}>Hangi şehir ve ilçede oynuyorsunuz?</div>
                                <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 12 }}>ŞEHİR</div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 }}>
                                    {CITIES.map(c => <button key={c} onClick={() => setData(p => ({ ...p, city: c, district: "" }))} style={{ padding: "9px 16px", borderRadius: 20, border: `1px solid ${data.city === c ? "#F5F234" : "#1a1a1a"}`, background: data.city === c ? "rgba(245,242,52,.1)" : "#0d0d0d", color: data.city === c ? "#F5F234" : "#555", fontSize: 13, fontWeight: data.city === c ? 700 : 400, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>{c}</button>)}
                                </div>
                                {data.city && (<>
                                    <div style={{ color: "#888", fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 12 }}>İLÇE</div>
                                    <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                                        {dists.map(di => <button key={di} onClick={() => setData(p => ({ ...p, district: di }))} style={{ padding: "8px 14px", borderRadius: 20, border: `1px solid ${data.district === di ? "#F5F234" : "#1a1a1a"}`, background: data.district === di ? "rgba(245,242,52,.1)" : "#0d0d0d", color: data.district === di ? "#F5F234" : "#555", fontSize: 12, fontWeight: data.district === di ? 700 : 400, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>{di}</button>)}
                                    </div>
                                </>)}
                            </div>
                        )}
                        {step === 2 && (
                            <div style={{ animation: "fadeUp .4s ease" }}>
                                <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 40, color: "#fff", lineHeight: 1, marginBottom: 6 }}>MÜSAİTLİK</div>
                                <div style={{ color: "#555", fontSize: 13, marginBottom: 28 }}>Hangi günler sahaya çıkabilirsiniz?</div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {DAYS.map(d => {
                                        const active = data.avail.includes(d); return (
                                            <button key={d} onClick={() => toggleDay(d)} style={{ padding: "16px 20px", borderRadius: 14, border: `1.5px solid ${active ? "#F5F234" : "#1a1a1a"}`, background: active ? "rgba(245,242,52,.08)" : "#0d0d0d", color: active ? "#F5F234" : "#555", fontSize: 14, fontWeight: active ? 700 : 400, cursor: "pointer", fontFamily: "'Outfit',sans-serif", display: "flex", alignItems: "center", justifyContent: "space-between", transition: "all .18s" }}>
                                                {d}<span style={{ fontSize: 18, opacity: active ? 1 : 0, transition: "opacity .15s" }}>✓</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        {step === 3 && (
                            <div style={{ animation: "popIn .5s cubic-bezier(.175,.885,.32,1.275)", textAlign: "center", paddingTop: 20 }}>
                                <div style={{ fontSize: 72, marginBottom: 16, animation: "heartbeat 1.5s ease infinite" }}>{data.logo}</div>
                                <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 44, color: "#fff", lineHeight: 1, letterSpacing: 2, marginBottom: 4 }}>{data.name}</div>
                                <div style={{ color: "#555", fontSize: 13, marginBottom: 32 }}>📍 {data.city} · {data.district}</div>
                                <div style={{ background: "#0d0d0d", border: "1px solid #1a1a1a", borderRadius: 18, padding: "20px", marginBottom: 24, textAlign: "left" }}>
                                    {[["Seviye", data.level], ["Oyuncu", `${data.players} kişi`], ["Müsaitlik", data.avail.length > 0 ? data.avail.join(", ") : "—"]].map(([l, v]) => (
                                        <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid #1a1a1a" }}>
                                            <span style={{ color: "#555", fontSize: 13 }}>{l}</span><span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>{v}</span>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ background: "rgba(245,242,52,.05)", border: "1px solid rgba(245,242,52,.2)", borderRadius: 14, padding: "14px 16px", textAlign: "left" }}>
                                    <div style={{ color: "#F5F234", fontSize: 12, fontWeight: 700, marginBottom: 6 }}>⚡ Başlangıç Bonusu</div>
                                    <div style={{ color: "#555", fontSize: 12, lineHeight: 1.7 }}>Kayıt tamamlandıktan sonra keşfet ekranında takımları görmeye başlayacaksın. İlk eşleşme +35 puan!</div>
                                </div>
                            </div>
                        )}
                    </div>
                    <div style={{ padding: "0 20px 24px", flexShrink: 0 }}>
                        {err && <div style={{ color: "#f87171", fontSize: 12, marginBottom: 10, textAlign: "center", fontWeight: 600 }}>⚠️ {err}</div>}
                        <button onClick={next} style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: "#F5F234", color: "#000", fontSize: 15, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
                            {step === 3 ? "⚽ Sahaya Çık →" : "Devam Et →"}
                        </button>
                        {step > 0 && <button onClick={() => { setStep(s => s - 1); setErr(""); }} style={{ width: "100%", padding: "12px", marginTop: 8, borderRadius: 14, border: "1px solid #1a1a1a", background: "transparent", color: "#555", fontSize: 13, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>← Geri</button>}
                    </div>
                </div>
            );
        }

        // ── MATCH POPUP ───────────────────────────────────────────────────────
        function MatchPopup({ team, me, th, onChat, onClose }) {
            return (
                <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,.7)", backdropFilter: "blur(8px)" }}>
                    <div style={{ width: "100%", maxWidth: 430, background: th.card, borderRadius: "28px 28px 0 0", padding: "24px 24px 36px", animation: "fadeUp .4s cubic-bezier(.175,.885,.32,1.275)" }}>
                        <div style={{ width: 48, height: 4, borderRadius: 2, background: th.border3, margin: "0 auto 20px" }} />
                        <div style={{ textAlign: "center", marginBottom: 16 }}>
                            <div style={{ fontSize: 60, marginBottom: 8, animation: "heartbeat 1s ease infinite" }}>{team.logo}</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 30, color: th.text, letterSpacing: 2, marginBottom: 4 }}>EŞLEŞTİN! 🎉</div>
                            <div style={{ color: th.acc, fontSize: 18, fontWeight: 800, marginBottom: 4 }}>{team.name}</div>
                            <div style={{ color: th.text4, fontSize: 13 }}>📍 {team.city} · {team.district}</div>
                        </div>
                        <div style={{ background: th.bg4, borderRadius: 16, padding: "16px", marginBottom: 16 }}>
                            <div style={{ display: "flex", justifyContent: "space-around" }}>
                                {[["⭐", team.rating, "Puan"], ["👥", `${team.players}`, "Oyuncu"], ["🏆", team.wins, "Galibiyet"]].map(([ic, v, l]) => (
                                    <div key={l} style={{ textAlign: "center" }}>
                                        <div style={{ fontSize: 18, marginBottom: 4 }}>{ic}</div>
                                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 22, color: th.text, letterSpacing: 1 }}>{v}</div>
                                        <div style={{ color: th.text4, fontSize: 10 }}>{l}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div style={{ display: "flex", gap: 10 }}>
                            <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 14, border: `1px solid ${th.border3}`, background: "transparent", color: th.text2, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>Daha Sonra</button>
                            <button onClick={onChat} style={{ flex: 2, padding: "14px", borderRadius: 14, border: "none", background: th.acc, color: th.accT, fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>💬 Mesaj Gönder →</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ── PREMIUM MODAL ─────────────────────────────────────────────────────
        function PremiumModal({ th, onActivate, onClose }) {
            return (
                <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,.8)", backdropFilter: "blur(12px)" }}>
                    <div style={{ width: "100%", maxWidth: 430, background: th.card, borderRadius: "28px 28px 0 0", padding: "24px 24px 40px", animation: "fadeUp .4s cubic-bezier(.175,.885,.32,1.275)" }}>
                        <div style={{ width: 48, height: 4, borderRadius: 2, background: th.border3, margin: "0 auto 20px" }} />
                        <div style={{ textAlign: "center", marginBottom: 20 }}>
                            <div style={{ fontSize: 52, marginBottom: 8 }}>⚡</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 32, color: "#F5F234", letterSpacing: 2, marginBottom: 4 }}>FUTMATCH PRO</div>
                            <div style={{ color: th.text3, fontSize: 13, lineHeight: 1.6 }}>Sınırsız swipe, öncelikli eşleşme ve daha fazlası</div>
                        </div>
                        {[["♾️", "Sınırsız Swipe", "Günlük limit yok"], ["⚡", "Süper Beğeni", "Her gün 5 süper beğeni"], ["📊", "Detaylı İstatistik", "Gelişmiş analiz paneli"], ["🏆", "Turnuva Önceliği", "Erken kayıt hakkı"]].map(([ic, t, s]) => (
                            <div key={t} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${th.border}` }}>
                                <span style={{ fontSize: 22, width: 32, textAlign: "center" }}>{ic}</span>
                                <div><div style={{ color: th.text, fontSize: 13, fontWeight: 700 }}>{t}</div><div style={{ color: th.text4, fontSize: 11 }}>{s}</div></div>
                            </div>
                        ))}
                        <div style={{ marginTop: 20, display: "flex", gap: 10 }}>
                            <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 14, border: `1px solid ${th.border3}`, background: "transparent", color: th.text3, fontSize: 13, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>İptal</button>
                            <button onClick={onActivate} style={{ flex: 2, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg,#F5F234,#FFD700)", color: "#000", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>⚡ ₺49/ay Başla</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ── SWIPE CARD ────────────────────────────────────────────────────────
        function SwipeCard({ team, dir, th, dark }) {
            const rnk = getRank(team.points);
            const anim = dir === "left" ? "swipeLeft .4s ease forwards" : dir === "right" ? "swipeRight .4s ease forwards" : "none";
            return (
                <div style={{ position: "absolute", width: "100%", height: "100%", borderRadius: 24, overflow: "hidden", background: th.card, border: `1px solid ${th.border}`, animation: anim, boxShadow: dark ? "0 20px 60px rgba(0,0,0,.8)" : "0 20px 60px rgba(0,0,0,.15)" }}>
                    <div style={{ height: "55%", background: dark ? `linear-gradient(160deg,#111,#0a0a00)` : `linear-gradient(160deg,#f8f7ee,#fff)`, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden" }}>
                        <div style={{ position: "absolute", inset: 0, backgroundImage: `radial-gradient(circle at 50% 40%, ${th.acc}15 0%, transparent 65%)`, pointerEvents: "none" }} />
                        <div style={{ textAlign: "center", position: "relative", zIndex: 1 }}>
                            <div style={{ fontSize: 80, marginBottom: 10, animation: "heartbeat 2s ease infinite" }}>{team.logo}</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 30, color: th.text, letterSpacing: 2, lineHeight: 1 }}>{team.name}</div>
                            <div style={{ color: th.text4, fontSize: 13, marginTop: 4 }}>📍 {team.city} · {team.district}</div>
                        </div>
                    </div>
                    <div style={{ padding: "16px 18px" }}>
                        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                            {[team.level, `${team.players} Oyuncu`, `${rnk.icon} ${rnk.label}`].map(t => (
                                <span key={t} style={{ padding: "4px 12px", borderRadius: 20, background: th.bg4, border: `1px solid ${th.border}`, color: th.text3, fontSize: 11, fontWeight: 600 }}>{t}</span>
                            ))}
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                            {[["G", team.wins, "#4ade80"], ["B", team.draws, th.text3], ["M", team.losses, "#f87171"]].map(([l, v, c]) => (
                                <div key={l} style={{ textAlign: "center", background: th.bg4, borderRadius: 12, padding: "10px 6px" }}>
                                    <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 22, color: c }}>{v}</div>
                                    <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1 }}>{l}</div>
                                </div>
                            ))}
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            {(team.avail || []).map(d => <span key={d} style={{ padding: "3px 9px", borderRadius: 20, background: `${th.acc}15`, border: `1px solid ${th.acc}44`, color: th.acc, fontSize: 10, fontWeight: 700 }}>{d}</span>)}
                        </div>
                        {team.desc && <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.6, marginTop: 10, fontStyle: "italic" }}>"{team.desc}"</div>}
                    </div>
                </div>
            );
        }

        // ── DISCOVER TAB ──────────────────────────────────────────────────────
        function DiscoverTab({ me, top, unswiped, swipeDir, doSwipe, rnk, prog, matches, setActiveChat, th, dark }) {
            const [showDate, setShowDate] = React.useState(false);
            const [dateInput, setDateInput] = React.useState("");
            const [timeInput, setTimeInput] = React.useState("14:00");
            const [inviteTarget, setInviteTarget] = React.useState(null);

            function sendInvite(m) {
                if (!dateInput) { return; }
                const dt = new Date(`${dateInput}T${timeInput}`);
                setShowDate(false);
                // handled by parent
                if (inviteTarget && inviteTarget.onSend) { inviteTarget.onSend(dt.toISOString()); }
                setDateInput(""); setInviteTarget(null);
            }

            if (!top && unswiped.length === 0) {
                return (
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: th.bg, padding: 24 }}>
                        <div style={{ fontSize: 52, marginBottom: 16 }}>🏆</div>
                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 30, color: th.text, letterSpacing: 2, marginBottom: 8 }}>HEPSİNİ GÖRDÜN!</div>
                        <div style={{ color: th.text4, fontSize: 13, textAlign: "center", lineHeight: 1.7 }}>Şu an gösterilecek yeni takım yok. Maçlarını kontrol et!</div>
                    </div>
                );
            }

            const chatMatches = matches.filter(m => m.chatId);
            return (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", background: th.bg, overflow: "hidden" }}>
                    {/* Header */}
                    <div style={{ padding: "14px 16px 10px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${th.border}`, flexShrink: 0 }}>
                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 22, color: th.text, letterSpacing: 2 }}>KEŞFET</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ color: th.text4, fontSize: 12 }}>{unswiped.length} takım</span>
                            <span style={{ padding: "3px 8px", borderRadius: 8, background: `${th.acc}20`, border: `1px solid ${th.acc}44`, color: th.acc, fontSize: 10, fontWeight: 700 }}>{rnk.icon} {rnk.label}</span>
                        </div>
                    </div>

                    {/* Card area */}
                    <div style={{ flex: 1, position: "relative", overflow: "hidden", padding: "12px 16px" }}>
                        <div style={{ position: "relative", width: "100%", height: "100%" }}>
                            {unswiped.slice(0, 3).reverse().map((t, i, arr) => {
                                const isTop = i === arr.length - 1;
                                const scale = 1 - ((arr.length - 1 - i) * 0.03);
                                const translateY = (arr.length - 1 - i) * 8;
                                return (
                                    <div key={t.id} style={{ position: "absolute", inset: 0, transform: isTop ? "none" : `scale(${scale}) translateY(-${translateY}px)`, transformOrigin: "bottom center", transition: "transform .3s ease" }}>
                                        {isTop ? <SwipeCard team={t} dir={swipeDir} th={th} dark={dark} /> : <SwipeCard team={t} dir={null} th={th} dark={dark} />}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Action buttons */}
                    <div style={{ flexShrink: 0, padding: "0 20px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 10 }}>
                            <button onClick={() => doSwipe("left")} style={{ width: 58, height: 58, borderRadius: 29, border: `2px solid #f87171`, background: "transparent", fontSize: 24, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#f87171", transition: "all .15s" }}>✕</button>
                            <button onClick={() => doSwipe("super")} style={{ width: 52, height: 52, borderRadius: 26, border: `2px solid #F5F234`, background: "transparent", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>⭐</button>
                            <button onClick={() => doSwipe("right")} style={{ width: 58, height: 58, borderRadius: 29, border: `2px solid #4ade80`, background: "transparent", fontSize: 24, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#4ade80", transition: "all .15s" }}>♥</button>
                        </div>
                        <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
                            <span style={{ color: th.text5, fontSize: 10 }}>✕ Geç</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>·</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>⭐ Süper</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>·</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>♥ Beğen</span>
                        </div>
                    </div>

                    {/* Active chats */}
                    {chatMatches.length > 0 && (
                        <div style={{ flexShrink: 0, borderTop: `1px solid ${th.border}`, padding: "10px 16px 10px" }}>
                            <div style={{ color: th.text4, fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 8 }}>SOHBETLER</div>
                            <div style={{ display: "flex", gap: 10, overflowX: "auto" }}>
                                {chatMatches.map(m => (
                                    <button key={m.id} onClick={() => setActiveChat(m.chatId)} style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, background: "none", border: "none", cursor: "pointer" }}>
                                        <div style={{ width: 44, height: 44, borderRadius: 14, background: th.bg4, border: `2px solid ${m.confirmed ? "#4ade80" : th.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{m.team.logo}</div>
                                        <span style={{ color: th.text4, fontSize: 9, maxWidth: 44, textAlign: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.team.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── CHAT SCREEN ───────────────────────────────────────────────────────
        function ChatScreen({ chatId, matches, chats, sendMsg, acceptInvite, rejectInvite, voteResult, onBack, th, dark }) {
            const [text, setText] = React.useState("");
            const [showInvite, setShowInvite] = React.useState(false);
            const [selDay, setSelDay] = React.useState(null);
            const [selTime, setSelTime] = React.useState("15:00");
            const match = matches.find(m => m.chatId === chatId);
            const msgs = chats[chatId] || [];
            const endRef = React.useRef(null);
            React.useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

            // Generate next 7 days
            const days = React.useMemo(() => {
                const arr = [];
                const now = new Date();
                const dayNames = ["Paz", "Pzt", "Sal", "Çar", "Per", "Cum", "Cmt"];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(now); d.setDate(now.getDate() + i);
                    arr.push({ label: (i === 0 ? "Bugün" : i === 1 ? "Yarın" : dayNames[d.getDay()]), date: d, iso: d.toISOString().split("T")[0] });
                }
                return arr;
            }, []);

            const times = ["10:00", "12:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00"];

            function send() { if (!text.trim()) return; sendMsg(chatId, text.trim()); setText(""); }

            function sendInvite() {
                if (!selDay) return;
                const dt = new Date(`${selDay.iso}T${selTime}`);
                const fmt = dt.toLocaleString("tr-TR", { weekday: "long", day: "numeric", month: "long", hour: "2-digit", minute: "2-digit" });
                sendMsg(chatId, `📅 Maç Daveti: ${fmt}`, "match_invite", { datetime: dt.toISOString(), accepted: false, rejected: false });
                setShowInvite(false); setSelDay(null); setSelTime("15:00");
            }

            const team = match?.team;
            return (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", background: th.bg, height: "100%" }}>
                    {/* Header */}
                    <div style={{ padding: "12px 16px", borderBottom: `1px solid ${th.border}`, display: "flex", alignItems: "center", gap: 12, flexShrink: 0, background: th.nav }}>
                        <button onClick={onBack} style={{ background: "none", border: "none", color: th.acc, fontSize: 22, cursor: "pointer", padding: 0, lineHeight: 1 }}>←</button>
                        {team && <><div style={{ fontSize: 26 }}>{team.logo}</div>
                            <div style={{ flex: 1 }}>
                                <div style={{ color: th.text, fontWeight: 800, fontSize: 15 }}>{team.name}</div>
                                <div style={{ color: match?.confirmed ? "#4ade80" : "#f97316", fontSize: 11, fontWeight: 600 }}>{match?.confirmed ? "✅ Maç Onaylandı" : "⏳ Onay Bekleniyor"}</div>
                            </div></>}
                    </div>
                    {/* Messages */}
                    <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
                        {msgs.map(msg => {
                            const isMe = msg.from === "me";
                            if (msg.type === "result_request") {
                                return (
                                    <div key={msg.id} style={{ background: dark ? "#0d1a0d" : "#f0fff4", border: "1px solid #4ade8044", borderRadius: 18, padding: "16px", margin: "8px 0" }}>
                                        <div style={{ color: "#4ade80", fontWeight: 800, fontSize: 14, marginBottom: 6 }}>{"⚽"} Maç Sonucu</div>
                                        <div style={{ color: th.text3, fontSize: 12, marginBottom: 12 }}>Maç sona erdi. Sonucu kaydedin.</div>
                                        {msg.myVote ? (
                                            <div style={{ textAlign: "center" }}>{msg.confirmed ? <div style={{ color: "#4ade80", fontWeight: 700 }}>{"✅"} Sonuç onaylandı!</div> : <div style={{ color: th.text4, fontSize: 12, animation: "pulse 1.5s infinite" }}>Rakip onayı bekleniyor…</div>}</div>
                                        ) : (
                                            <div style={{ display: "flex", gap: 8 }}>
                                                {[["🏆", "Kazandık", "win", "#4ade80"], ["🤝", "Beraberlik", "draw", th.text3], ["😞", "Kaybettik", "loss", "#f87171"]].map(([ic, lb, v, c]) => (
                                                    <button key={v} onClick={() => voteResult(chatId, msg.id, msg.matchId, v)} style={{ flex: 1, padding: "10px 4px", borderRadius: 12, border: `1px solid ${c}44`, background: `${c}12`, color: c, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
                                                        <div style={{ fontSize: 20, marginBottom: 4 }}>{ic}</div>{lb}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            }
                            if (msg.type === "match_invite") {
                                const p = msg.payload;
                                return (
                                    <div key={msg.id} style={{ alignSelf: "flex-start", maxWidth: "88%" }}>
                                        <div style={{ background: dark ? "#0d1400" : "#fffbe6", border: "1px solid #F5F23444", borderRadius: 18, padding: "14px" }}>
                                            <div style={{ color: "#F5F234", fontWeight: 800, fontSize: 13, marginBottom: 4 }}>📅 Maç Daveti</div>
                                            <div style={{ color: th.text2, fontSize: 13, marginBottom: 10, lineHeight: 1.5 }}>{msg.text.replace("📅 Maç Daveti: ", "")}</div>
                                            {!p.accepted && !p.rejected && !isMe && (
                                                <div style={{ display: "flex", gap: 8 }}>
                                                    <button onClick={() => acceptInvite(chatId, msg.id, p)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: "#4ade80", color: "#000", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>✅ Kabul</button>
                                                    <button onClick={() => rejectInvite(chatId, msg.id)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "1px solid #f87171", background: "transparent", color: "#f87171", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>❌ Reddet</button>
                                                </div>
                                            )}
                                            {p.accepted && <div style={{ color: "#4ade80", fontSize: 12, fontWeight: 700 }}>✅ Kabul edildi!</div>}
                                            {p.rejected && <div style={{ color: "#f87171", fontSize: 12, fontWeight: 700 }}>❌ Reddedildi</div>}
                                            {isMe && !p.accepted && !p.rejected && <div style={{ color: th.text4, fontSize: 11, animation: "pulse 1.5s infinite" }}>Yanıt bekleniyor…</div>}
                                        </div>
                                    </div>
                                );
                            }
                            return (
                                <div key={msg.id} style={{ display: "flex", justifyContent: isMe ? "flex-end" : "flex-start" }}>
                                    <div style={{ maxWidth: "75%", padding: "10px 14px", borderRadius: isMe ? "18px 18px 4px 18px" : "18px 18px 18px 4px", background: isMe ? th.acc : th.card, color: isMe ? th.accT : th.text, fontSize: 14, border: isMe ? "none" : `1px solid ${th.border}`, fontWeight: isMe ? 600 : 400 }}>
                                        {msg.text}
                                    </div>
                                </div>
                            );
                        })}
                        <div ref={endRef} />
                    </div>
                    {/* Invite panel */}
                    {showInvite && (
                        <div style={{ flexShrink: 0, padding: "14px 16px", borderTop: `1px solid ${th.border}`, background: th.bg4, animation: "slideDown .25s ease" }}>
                            <div style={{ fontWeight: 700, fontSize: 14, color: th.text, marginBottom: 12 }}>📅 Maç Tarihi Belirle</div>
                            {/* Day chips */}
                            <div style={{ color: th.text4, fontSize: 10, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>GÜN SEÇ</div>
                            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 12 }}>
                                {days.map(d => (
                                    <button key={d.iso} onClick={() => setSelDay(d)} style={{ flexShrink: 0, padding: "8px 14px", borderRadius: 12, border: `1.5px solid ${selDay?.iso === d.iso ? th.acc : th.border}`, background: selDay?.iso === d.iso ? `${th.acc}18` : "transparent", color: selDay?.iso === d.iso ? th.acc : th.text3, fontSize: 12, fontWeight: selDay?.iso === d.iso ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>
                                        <div style={{ fontSize: 10, marginBottom: 2 }}>{d.label}</div>
                                        <div style={{ fontWeight: 900 }}>{d.date.getDate()} {["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"][d.date.getMonth()]}</div>
                                    </button>
                                ))}
                            </div>
                            {/* Time chips */}
                            <div style={{ color: th.text4, fontSize: 10, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>SAAT SEÇ</div>
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                                {times.map(t => (
                                    <button key={t} onClick={() => setSelTime(t)} style={{ padding: "7px 12px", borderRadius: 10, border: `1.5px solid ${selTime === t ? th.acc : th.border}`, background: selTime === t ? `${th.acc}18` : "transparent", color: selTime === t ? th.acc : th.text3, fontSize: 12, fontWeight: selTime === t ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>{t}</button>
                                ))}
                            </div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <button onClick={() => setShowInvite(false)} style={{ flex: 1, padding: "11px", borderRadius: 12, border: `1px solid ${th.border}`, background: "transparent", color: th.text3, fontSize: 13, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>İptal</button>
                                <button onClick={sendInvite} disabled={!selDay} style={{ flex: 2, padding: "11px", borderRadius: 12, border: "none", background: selDay ? th.acc : "#222", color: selDay ? th.accT : "#555", fontSize: 13, fontWeight: 700, cursor: selDay ? "pointer" : "default", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>
                                    {selDay ? `${selDay.label} ${selDay.date.getDate()} — ${selTime} Davet Gönder 📨` : "Önce bir gün seç"}
                                </button>
                            </div>
                        </div>
                    )}
                    {/* Input */}
                    <div style={{ flexShrink: 0, padding: "10px 12px", borderTop: `1px solid ${th.border}`, background: th.nav, display: "flex", gap: 8, alignItems: "center" }}>
                        {!match?.confirmed && <button onClick={() => setShowInvite(v => !v)} style={{ padding: "0 12px", height: 44, borderRadius: 12, border: `1px solid ${showInvite ? th.acc : th.border}`, background: showInvite ? `${th.acc}15` : th.bg4, color: th.acc, fontSize: 18, cursor: "pointer", transition: "all .2s" }}>📅</button>}
                        <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Mesaj yaz…" style={{ flex: 1, padding: "10px 14px", borderRadius: 12, border: `1px solid ${th.border2}`, background: th.inp, color: th.text, fontSize: 14, outline: "none", fontFamily: "'Outfit',sans-serif" }} />
                        <button onClick={send} disabled={!text.trim()} style={{ padding: "0 16px", height: 44, borderRadius: 12, border: "none", background: text.trim() ? th.acc : "#1a1a1a", color: text.trim() ? th.accT : th.text4, fontSize: 15, fontWeight: 700, cursor: text.trim() ? "pointer" : "default", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>→</button>
                    </div>
                </div>
            );
        }
        // ── MATCHES TAB ───────────────────────────────────────────────────────
        function MatchesTab({ matches, onChat, th }) {
            const upcoming = matches.filter(m => m.confirmed && !m.result);
            const pending = matches.filter(m => !m.confirmed);
            const finished = matches.filter(m => m.result);
            const resColor = { win: "#4ade80", loss: "#f87171", draw: th.text3 };
            const resLabel = { win: "🏆 Galibiyet", loss: "😞 Mağlubiyet", draw: "🤝 Beraberlik" };
            return (
                <div style={{ flex: 1, overflowY: "auto", background: th.bg }}>
                    <div style={{ padding: "14px 16px 0" }}>
                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 26, color: th.text, letterSpacing: 2, marginBottom: 14 }}>EŞLEŞMELERİM</div>
                        {upcoming.length > 0 && <><SecTit th={th}>YAKLAŞAN ({upcoming.length})</SecTit>
                            {upcoming.map(m => (
                                <div key={m.id} onClick={() => onChat(m.chatId)} style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 16, padding: "14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center", cursor: "pointer", animation: "fadeUp .3s ease" }}>
                                    <div style={{ fontSize: 26 }}>{m.team.logo}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ color: th.text, fontWeight: 700, fontSize: 14 }}>{m.team.name}</div>
                                        {m.scheduledTime && <div style={{ color: "#4ade80", fontSize: 12, marginTop: 2 }}>🗓 {new Date(m.scheduledTime).toLocaleString("tr-TR", { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</div>}
                                    </div>
                                    <span style={{ color: th.acc }}>›</span>
                                </div>
                            ))}</>}
                        {pending.length > 0 && <><SecTit th={th}>ONAY BEKLİYOR ({pending.length})</SecTit>
                            {pending.map(m => (
                                <div key={m.id} onClick={() => onChat(m.chatId)} style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 16, padding: "14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center", cursor: "pointer" }}>
                                    <div style={{ fontSize: 26 }}>{m.team.logo}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ color: th.text, fontWeight: 600, fontSize: 14 }}>{m.team.name}</div>
                                        <div style={{ color: "#f97316", fontSize: 12, marginTop: 2 }}>⏳ Tarih belirlenmedi</div>
                                    </div>
                                    <div style={{ width: 8, height: 8, borderRadius: 4, background: "#f97316", animation: "pulse 1.5s infinite" }} />
                                </div>
                            ))}</>}
                        {finished.length > 0 && <><SecTit th={th}>TAMAMLANAN ({finished.length})</SecTit>
                            {finished.map(m => (
                                <div key={m.id} style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 16, padding: "14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center" }}>
                                    <div style={{ fontSize: 26 }}>{m.team.logo}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ color: th.text, fontWeight: 600, fontSize: 14 }}>{m.team.name}</div>
                                        <div style={{ color: resColor[m.result], fontSize: 12, marginTop: 2, fontWeight: 700 }}>{resLabel[m.result]}</div>
                                    </div>
                                </div>
                            ))}</>}
                        {matches.length === 0 && (
                            <div style={{ textAlign: "center", paddingTop: 60 }}>
                                <div style={{ fontSize: 48, marginBottom: 16 }}>📅</div>
                                <div style={{ color: th.text2, fontWeight: 700, fontSize: 16, marginBottom: 8 }}>Henüz maç yok</div>
                                <div style={{ color: th.text4, fontSize: 13 }}>Keşfet ekranından takım beğen!</div>
                            </div>
                        )}
                        <div style={{ height: 20 }} />
                    </div>
                </div>
            );
        }

        // ── LEADERBOARD ───────────────────────────────────────────────────────
        function LeaderTab({ me, all, th, dark }) {
            const [filter, setFilter] = React.useState("all");
            const medals = ["🥇", "🥈", "🥉"];
            const cityBoard = all.filter(t => t.city && t.city === me?.city);
            const board = filter === "city" ? cityBoard : all;
            const myPos = all.findIndex(t => t.id === (me?.id)) + 1;
            const inTop8 = myPos >= 1 && myPos <= 8;
            return (
                <div style={{ flex: 1, overflowY: "auto", background: th.bg }}>
                    {/* FutCup Banner */}
                    <div style={{ margin: "14px 14px 0", padding: "14px 16px", borderRadius: 18, background: dark ? "linear-gradient(135deg,rgba(245,242,52,.1),rgba(245,242,52,.03))" : "linear-gradient(135deg,#fffef0,#fffbe6)", border: "1.5px solid rgba(245,242,52,.4)", display: "flex", gap: 12, alignItems: "center" }}>
                        <div style={{ fontSize: 32, flexShrink: 0 }}>🏆</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ color: th.acc, fontWeight: 800, fontSize: 14, marginBottom: 4 }}>FutCup Turnuvası</div>
                            <div style={{ color: th.text4, fontSize: 12, lineHeight: 1.55 }}>Genel sıralamada <span style={{ color: th.acc, fontWeight: 700 }}>ilk 8 takım</span> sezon sonu FutCup Turnuvası'na katılım hakkı kazanır!</div>
                        </div>
                        <div style={{ flexShrink: 0, textAlign: "center" }}>
                            <div style={{ color: inTop8 ? "#4ade80" : "#f87171", fontWeight: 800, fontSize: 11 }}>{inTop8 ? "İÇERİDE!" : "#" + myPos}</div>
                            <div style={{ color: th.text4, fontSize: 9, marginTop: 2 }}>{inTop8 ? "Hakkı kazandın" : "Daha var"}</div>
                        </div>
                    </div>
                    {/* Filter tabs */}
                    <div style={{ display: "flex", margin: "12px 14px 0", background: th.bg4, borderRadius: 12, padding: 3, border: `1px solid ${th.border}` }}>
                        {[["all", "🌍  Genel"], ["city", `📍  ${me?.city || "Şehrim"}`]].map(([k, l]) => (
                            <button key={k} onClick={() => setFilter(k)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: filter === k ? th.acc : "transparent", color: filter === k ? th.accT : th.text4, fontSize: 12, fontWeight: filter === k ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>{l}</button>
                        ))}
                    </div>
                    {filter === "city" && cityBoard.length === 0 && (
                        <div style={{ textAlign: "center", padding: "32px 20px", color: th.text4, fontSize: 13 }}>Bu şehirde henüz başka kayıtlı takım yok.</div>
                    )}
                    {/* ── PODIUM ── */}
                    {board.length >= 3 && (
                        <div style={{ margin: "16px 0 0", animation: "fadeUp .5s ease" }}>
                            {/* ambient glow bg */}
                            <div style={{ position: "relative", background: dark ? "linear-gradient(180deg,rgba(255,215,0,.04) 0%,transparent 100%)" : "linear-gradient(180deg,rgba(255,215,0,.06) 0%,transparent 100%)", padding: "20px 14px 0" }}>
                                <div style={{ color: th.text4, fontSize: 9, letterSpacing: 3, fontWeight: 800, textAlign: "center", marginBottom: 20 }}>🏆 SEZON PODYUMU</div>
                                {/* podium row — players float above columns */}
                                <div style={{ display: "flex", alignItems: "flex-end", gap: 6 }}>

                                    {/* ── 2nd place ── */}
                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", animation: "fadeUp .5s .1s ease both" }}>
                                        {/* avatar bubble */}
                                        <div style={{ width: 52, height: 52, borderRadius: 16, background: dark ? "#1a1a1a" : "#f0f0f0", border: "2px solid #C0C0C0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 6, boxShadow: dark ? "0 0 18px rgba(192,192,192,.2)" : "0 4px 16px rgba(0,0,0,.1)", animation: "heartbeat 2.2s ease infinite" }}>{board[1].logo}</div>
                                        <div style={{ color: "#C0C0C0", fontWeight: 900, fontSize: 11, textAlign: "center", maxWidth: 72, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{board[1].name}</div>
                                        <div style={{ color: dark ? "#777" : "#999", fontWeight: 700, fontSize: 10, marginBottom: 8 }}>{board[1].points} puan</div>
                                        {/* column */}
                                        <div style={{ width: "100%", height: 72, borderRadius: "12px 12px 0 0", position: "relative", overflow: "hidden", background: dark ? "linear-gradient(180deg,#323232 0%,#1e1e1e 100%)" : "linear-gradient(180deg,#e8e8e8 0%,#bdbdbd 100%)", boxShadow: dark ? "inset 0 1px 0 rgba(255,255,255,.08), 0 -2px 16px rgba(192,192,192,.12)" : "inset 0 1px 0 rgba(255,255,255,.8), 0 -2px 12px rgba(0,0,0,.08)" }}>
                                            <div style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%)" }} />
                                            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                                                <div style={{ fontSize: 20 }}>🥈</div>
                                                <div style={{ color: dark ? "rgba(192,192,192,.8)" : "rgba(100,100,100,.9)", fontSize: 13, fontWeight: 900, letterSpacing: 1 }}>2</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* ── 1st place ── */}

                                        <div style={{ color: "#CD7F32", fontWeight: 900, fontSize: 11, textAlign: "center", maxWidth: 72, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{board[2].name}</div>
                                        <div style={{ color: dark ? "#7a5020" : "#a0622a", fontWeight: 700, fontSize: 10, marginBottom: 8 }}>{board[2].points} puan</div>

                                        <div style={{ width: "100%", height: 48, borderRadius: "12px 12px 0 0", position: "relative", overflow: "hidden", background: dark ? "linear-gradient(180deg,#2e1c0a 0%,#1a1008 100%)" : "linear-gradient(180deg,#e8a060 0%,#b5611a 100%)", boxShadow: dark ? "inset 0 1px 0 rgba(205,127,50,.1), 0 -2px 16px rgba(205,127,50,.1)" : "inset 0 1px 0 rgba(255,255,255,.5), 0 -2px 12px rgba(205,127,50,.2)" }}>
                                            <div style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%)" }} />
                                            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                                                <div style={{ fontSize: 18 }}>🥉</div>
                                                <div style={{ color: dark ? "rgba(205,127,50,.8)" : "rgba(120,60,10,.8)", fontSize: 11, fontWeight: 900, letterSpacing: 1 }}>3</div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                                {/* base platform */}
                                <div style={{ height: 6, background: dark ? "linear-gradient(90deg,#111,#1e1e1e,#111)" : "linear-gradient(90deg,#e0e0e0,#f5f5f5,#e0e0e0)", borderTop: dark ? "1px solid #2a2a2a" : "1px solid #ccc" }} />
                            </div>
                        </div>
                    )}
                    <div style={{ padding: "10px 14px 0" }}>
                        {board.map((t, i) => {

                                <div key={t.id || i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px", borderRadius: 14, marginBottom: 6, background: isMe ? `${th.acc}14` : inCup ? `${th.acc}06` : th.card, border: `1px solid ${isMe ? th.acc : inCup ? "rgba(245,242,52,.2)" : th.border}`, animation: "fadeUp .3s ease", animationDelay: `${i * .025}s` }}>

                                        <div style={{ fontWeight: 800, fontSize: 17, color: th.text, letterSpacing: -0.5 }}>{t.points || 0}</div>
                                    </div>
                                </div>
                            );
                        })}
                        <div style={{ height: 24 }} />
                    </div>
                </div>
            );
        }
        // -- PROFILE TAB --

            function save() { updateMe({ name: editName.trim() || me.name, desc: editDesc.trim() }); setEditing(false); }

            return (
                <div style={{ flex: 1, overflowY: "auto", background: th.bg }}>
