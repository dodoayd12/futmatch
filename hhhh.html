                            <button onClick={() => setShowSettings(true)} style={{ position: "absolute", top: 14, right: 14, width: 36, height: 36, borderRadius: 12, border: `1px solid ${th.border}`, background: th.bg4, color: th.text3, fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2 }}>{"⚙️"}</button>
                            <div style={{ display: "flex", gap: 14, alignItems: "center", position: "relative" }}>
                                <div style={{ fontSize: 52, width: 70, height: 70, borderRadius: 18, background: th.bg4, border: `1px solid ${th.hBord}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{me.logo}</div>
                                <div style={{ flex: 1, minWidth: 0, paddingRight: 44 }}>
                                    {editing ? (
                                        <input value={editName} onChange={e => setEditName(e.target.value)} style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: `1px solid ${th.border2}`, background: th.inp, color: th.text, fontSize: 16, outline: "none", fontFamily: "'Outfit',sans-serif", marginBottom: 6 }} />
                                    ) : (
                                        <div style={{ fontWeight: 900, fontSize: 22, color: th.text, marginBottom: 2 }}>{me.name}</div>
                                    )}
                                    <div style={{ color: th.text4, fontSize: 12 }}>{"📍"} {me.city} · {me.district}</div>
                                    <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                                        <span style={{ padding: "2px 8px", borderRadius: 20, border: `1px solid ${rnk.color}`, color: rnk.color, fontSize: 11 }}>{rnk.icon} {rnk.label}</span>
                                        {me.isPremium && <span style={{ padding: "2px 8px", borderRadius: 20, background: "rgba(245,242,52,.15)", border: "1px solid rgba(245,242,52,.4)", color: th.acc, fontSize: 11 }}>{"⚡"} PRO</span>}
                                    </div>
                                </div>
                            </div>
                            {editing && <>
                                <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1.5, fontWeight: 700, margin: "12px 0 6px" }}>TAKIM TANITIMI</div>
                                <textarea value={editDesc} onChange={e => setEditDesc(e.target.value)} rows={2} maxLength={200} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${th.border2}`, background: th.inp, color: th.text, fontSize: 13, outline: "none", fontFamily: "'Outfit',sans-serif", resize: "none", lineHeight: 1.5 }} />
                            </>}
                            {!editing && me.desc && <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.6, marginTop: 10, fontStyle: "italic" }}>"{me.desc}"</div>}
                            <div style={{ marginTop: 14 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                    <span style={{ color: th.text4, fontSize: 10, fontWeight: 600 }}>{me.points || 0} PUAN</span>
                                    {nextRnk && <span style={{ color: th.text4, fontSize: 10 }}>{"→"} {nextRnk.label} ({nextRnk.min})</span>}
                                </div>
                                <div style={{ height: 4, background: th.border, borderRadius: 2, overflow: "hidden" }}>
                                    <div style={{ height: "100%", width: `${prog}%`, background: `linear-gradient(90deg,${th.acc},${dark ? "#fff" : "#222"})`, borderRadius: 2, transition: "width .5s ease" }} />
                                </div>
                            </div>
                            <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                                <button onClick={() => { if (editing) save(); else setEditing(true); }} style={{ flex: 1, padding: "9px", borderRadius: 11, border: `1px solid ${th.border}`, background: editing ? th.acc : th.bg4, color: editing ? th.accT : th.text3, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>{editing ? "✓ Kaydet" : "✏️ Düzenle"}</button>
                                {editing && <button onClick={() => setEditing(false)} style={{ flex: 1, padding: "9px", borderRadius: 11, border: `1px solid ${th.border}`, background: "transparent", color: th.text4, fontSize: 12, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{"İptal"}</button>}
                            </div>
                        </div>
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, marginBottom: 14, overflow: "hidden" }}>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr" }}>
                                {[["G", me.wins || 0, "#4ade80"], ["B", me.draws || 0, th.text3], ["M", me.losses || 0, "#f87171"], ["Oran", `%${wr}`, th.acc]].map(([l, v, c], i) => (
                                    <div key={l} style={{ padding: "14px 8px", textAlign: "center", borderRight: i < 3 ? `1px solid ${th.border}` : "" }}>
                                        <div style={{ fontWeight: 900, fontSize: 24, color: c }}>{v}</div>
                                        <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1, marginTop: 2 }}>{l}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, padding: "16px", marginBottom: 14 }}>
                            <SecTit th={th}>MÜSAİTLİK</SecTit>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                                {DAYS.map(d => {
                                    const active = me.avail?.includes(d); return (
                                        <button key={d} onClick={() => toggleDay(d)} style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${active ? th.acc : th.border2}`, color: active ? th.acc : th.text4, fontSize: 12, fontWeight: active ? 700 : 400, background: active ? `${th.acc}12` : "transparent", cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .18s" }}>{d}</button>
                                    );
                                })}
                            </div>
                        </div>
                        {!me.isPremium && (
                            <button onClick={() => setShowPrem(true)} style={{ width: "100%", marginBottom: 24, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg,#F5F234,#FFD700)", color: "#000", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
                                {"⚡"} Premium'a Geç — ₺49/ay
                            </button>
                        )}
                        <div style={{ height: 20 }} />
                    </div>
                </div>
            );
        }
        function StatusBadge({ status, color }) {
            const cfg = { "Kayıt Açık": { bg: "rgba(74,222,128,.12)", border: "rgba(74,222,128,.4)", c: "#4ade80", dot: true }, "Yakında": { bg: "rgba(251,191,36,.1)", border: "rgba(251,191,36,.4)", c: "#fbbf24", dot: false }, "Özel Davet": { bg: "rgba(167,139,250,.12)", border: "rgba(167,139,250,.4)", c: "#a78bfa", dot: false }, "Çok Yakında": { bg: "rgba(248,113,113,.1)", border: "rgba(248,113,113,.4)", c: "#f87171", dot: false } };
            const s = cfg[status] || { bg: "transparent", border: "#333", c: "#888", dot: false };
            return <span style={{ padding: "3px 9px", borderRadius: 20, background: s.bg, border: `1px solid ${s.border}`, color: s.c, fontSize: 10, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 4 }}>{s.dot && <span style={{ width: 5, height: 5, borderRadius: "50%", background: s.c, animation: "pulse 1.5s infinite" }} />}{status}</span>;
        }

        // ── TOURNAMENTS TAB ───────────────────────────────────────────────────
        function TournamentsTab({ me, rnk, th, dark }) {
            const [selected, setSelected] = React.useState(null);
            const myRankIdx = rankIndex(rnk.label);
            if (selected) return <TournamentDetail t={selected} me={me} myRankIdx={myRankIdx} th={th} dark={dark} onBack={() => setSelected(null)} />;
            return (
                <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 28px" }}>
                    <div style={{ background: dark ? `linear-gradient(135deg,${rnk.color}18,transparent)` : `linear-gradient(135deg,${rnk.color}22,transparent)`, border: `1px solid ${rnk.color}44`, borderRadius: 16, padding: "12px 16px", marginBottom: 18, display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ fontSize: 32 }}>{rnk.icon}</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ color: rnk.color, fontWeight: 800, fontSize: 14 }}>{rnk.label} Seviyesin</div>
                            <div style={{ color: th.text4, fontSize: 11, marginTop: 2 }}>{me.points} puan · Uygun turnuvalar aşağıda</div>
                        </div>
                        <div style={{ background: rnk.color, color: "#000", padding: "5px 10px", borderRadius: 10, fontSize: 10, fontWeight: 900 }}>{TOURNAMENTS.filter(t => rankIndex(t.rankReq) <= myRankIdx).length} UYGUN</div>
                    </div>
                    {TOURNAMENTS.map((t, i) => {
                        const locked = rankIndex(t.rankReq) > myRankIdx;
                        const reqRank = RANKS.find(r => r.label === t.rankReq);
                        const filled = t.participants.length / t.maxParticipants;
                        return (
                            <div key={t.id} onClick={() => setSelected(t)} style={{ marginBottom: 12, borderRadius: 20, overflow: "hidden", border: `1.5px solid ${locked ? "#1c1c1c" : t.color + "55"}`, cursor: "pointer", animation: "fadeUp .35s ease both", animationDelay: `${i * .07}s`, position: "relative" }}>
                                <div style={{ background: dark ? `linear-gradient(135deg,${t.grad[0]},${t.grad[1]})` : "#fff", padding: "16px 16px 12px", position: "relative", overflow: "hidden", opacity: locked ? 0.6 : 1 }}>
                                    <div style={{ position: "absolute", top: -10, right: -10, fontSize: 70, opacity: .06 }}>{t.icon}</div>
                                    <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                                        <div style={{ width: 52, height: 52, borderRadius: 14, background: `${t.glow}.15)`, border: `1.5px solid ${t.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: locked ? 22 : 26, flexShrink: 0 }}>{locked ? "🔒" : t.icon}</div>
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 19, color: locked ? "#555" : t.color, letterSpacing: 1.5, lineHeight: 1 }}>{t.name}</div>
                                            <div style={{ color: th.text4, fontSize: 11, marginTop: 3 }}>{t.subtitle}</div>
                                            <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                                                {locked ? <span style={{ padding: "3px 9px", borderRadius: 20, background: "rgba(248,113,113,.1)", border: "1px solid rgba(248,113,113,.3)", color: "#f87171", fontSize: 10, fontWeight: 700 }}>🔒 {reqRank?.icon} {reqRank?.label} Gerekli</span> : <StatusBadge status={t.status} color={t.color} />}
                                                <span style={{ padding: "3px 9px", borderRadius: 20, border: `1px solid ${th.border}`, color: th.text4, fontSize: 10 }}>🗓 {t.startDate}</span>
                                            </div>
                                        </div>
                                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 20, color: locked ? "#444" : t.color, letterSpacing: 1 }}>{t.prize}</div>
                                            <div style={{ color: th.text5, fontSize: 9, marginTop: 1 }}>ÖDÜL</div>
                                        </div>
                                    </div>
                                    {!locked && <div style={{ marginTop: 12 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ color: th.text4, fontSize: 10 }}>Katılımcı: {t.participants.length}/{t.maxParticipants}</span>
                                            <span style={{ color: filled >= 0.8 ? "#f97316" : t.color, fontSize: 10, fontWeight: 700 }}>{filled >= 1 ? "✅ Dolu" : filled >= 0.8 ? "⚠️ Dolmak üzere" : `${t.maxParticipants - t.participants.length} yer kaldı`}</span>
                                        </div>
                                        <div style={{ height: 4, background: "rgba(255,255,255,.08)", borderRadius: 2, overflow: "hidden" }}>
                                            <div style={{ height: "100%", width: `${Math.min(100, filled * 100)}%`, background: `linear-gradient(90deg,${t.color},${t.color}88)`, borderRadius: 2 }} />
                                        </div>
                                    </div>}
                                    {locked && <div style={{ marginTop: 12 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ color: "#555", fontSize: 10 }}>İlerleme: {me.points}/{reqRank?.min} puan</span>
                                            <span style={{ color: "#f87171", fontSize: 10, fontWeight: 700 }}>{(reqRank?.min || 0) - me.points} puan eksik</span>
                                        </div>
                                        <div style={{ height: 4, background: "#1a1a1a", borderRadius: 2, overflow: "hidden" }}>
                                            <div style={{ height: "100%", width: `${Math.min(100, (me.points / (reqRank?.min || 1)) * 100)}%`, background: "linear-gradient(90deg,#f97316,#f87171)", borderRadius: 2 }} />
                                        </div>
                                    </div>}
                                </div>
                                <div style={{ background: dark ? "#080808" : "#f8f8f4", padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", borderTop: `1px solid ${dark ? "#111" : "#eee"}` }}>
                                    <div style={{ display: "flex" }}>
                                        {t.participants.slice(0, 5).map((p, pi) => (
                                            <div key={pi} style={{ width: 26, height: 26, borderRadius: 8, background: dark ? "#1a1a1a" : "#fff", border: `1px solid ${t.color}33`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, marginLeft: pi > 0 ? -6 : 0 }}>{p.logo}</div>
                                        ))}
                                        {t.participants.length === 0 && <span style={{ color: th.text5, fontSize: 11 }}>Henüz kayıt yok</span>}
                                    </div>
                                    <div style={{ color: locked ? "#555" : t.color, fontSize: 11, fontWeight: 700 }}>{locked ? `${(reqRank?.min || 0) - me.points} puan eksik →` : "Detaylar →"}</div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ── TOURNAMENT DETAIL ─────────────────────────────────────────────────
        function TournamentDetail({ t, me, myRankIdx, th, dark, onBack }) {
            const [regDone, setRegDone] = React.useState(false);
            const locked = rankIndex(t.rankReq) > myRankIdx;
            const alreadyIn = t.participants.some(p => p.name === me.name);
            const canReg = !locked && !alreadyIn && t.status === "Kayıt Açık";
            return (
                <div style={{ flex: 1, overflowY: "auto" }}>
                    <div style={{ background: dark ? `linear-gradient(160deg,${t.grad[0]},${t.grad[1]})` : "#fff", padding: "20px 16px 16px", position: "relative", overflow: "hidden" }}>
                        <div style={{ position: "absolute", inset: 0, backgroundImage: `radial-gradient(circle at 70% 30%, ${t.glow}.12) 0%, transparent 60%)`, pointerEvents: "none" }} />
                        <button onClick={onBack} style={{ background: "none", border: "none", color: t.color, fontSize: 20, cursor: "pointer", marginBottom: 16, padding: 0, position: "relative" }}>← Geri</button>
                        <div style={{ textAlign: "center", position: "relative" }}>
                            <div style={{ fontSize: 64, marginBottom: 10, animation: "heartbeat 2s ease infinite" }}>{t.icon}</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 28, color: t.color, letterSpacing: 2, lineHeight: 1, marginBottom: 4 }}>{t.name}</div>
                            <div style={{ color: th.text4, fontSize: 13, marginBottom: 12 }}>{t.subtitle}</div>
                            <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
                                <StatusBadge status={t.status} color={t.color} />
                                <span style={{ padding: "3px 9px", borderRadius: 20, border: `1px solid ${th.border}`, color: th.text4, fontSize: 10 }}>{t.format}</span>
                                <span style={{ padding: "3px 9px", borderRadius: 20, border: `1px solid ${th.border}`, color: th.text4, fontSize: 10 }}>🗓 {t.startDate}</span>
                            </div>
                        </div>
                    </div>
                    <div style={{ padding: "16px 16px 40px" }}>
                        {/* Prize */}
                        <div style={{ background: dark ? `${t.glow}.08)` : "#fffbe6", border: `1px solid ${t.color}33`, borderRadius: 18, padding: "16px", marginBottom: 14, textAlign: "center" }}>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 44, color: t.color, letterSpacing: 2 }}>{t.prize}</div>
                            <div style={{ color: th.text4, fontSize: 12, marginTop: 4 }}>TOPLAM ÖDÜL HAVUZU</div>
                            <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 10, flexWrap: "wrap" }}>
                                {t.prizes.map((p, i) => <span key={i} style={{ padding: "4px 10px", borderRadius: 20, background: `${t.color}18`, border: `1px solid ${t.color}44`, color: t.color, fontSize: 11, fontWeight: 700 }}>{p}</span>)}
                            </div>
                        </div>
                        {/* Desc */}
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, padding: "16px", marginBottom: 14 }}>
                            <div style={{ color: th.text2, fontSize: 13, lineHeight: 1.7 }}>{t.desc}</div>
                        </div>
                        {/* Schedule */}
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, padding: "16px", marginBottom: 14 }}>
                            <SecTit th={th}>TAKVİM</SecTit>
                            {t.schedule.map((s, i) => (
                                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < t.schedule.length - 1 ? `1px solid ${th.border}` : "" }}>
                                    <div style={{ width: 8, height: 8, borderRadius: 4, background: t.color, flexShrink: 0 }} />
                                    <div style={{ flex: 1, color: th.text, fontSize: 13, fontWeight: 600 }}>{s.round}</div>
                                    <div style={{ color: th.text4, fontSize: 12 }}>{s.date} · {s.time}</div>
                                </div>
                            ))}
                        </div>
                        {/* Participants */}
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, padding: "16px", marginBottom: 14 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                                <SecTit th={th}>KATILIMCILAR</SecTit>
                                <span style={{ color: t.color, fontSize: 11, fontWeight: 700 }}>{t.participants.length}/{t.maxParticipants}</span>
                            </div>
                            <div style={{ height: 4, background: th.border, borderRadius: 2, overflow: "hidden", marginBottom: 12 }}>
                                <div style={{ height: "100%", width: `${Math.min(100, (t.participants.length / t.maxParticipants) * 100)}%`, background: `linear-gradient(90deg,${t.color},${t.color}88)`, borderRadius: 2 }} />
                            </div>
                            {t.participants.map((p, i) => (
                                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < t.participants.length - 1 ? `1px solid ${th.border}` : "" }}>
                                    <div style={{ width: 34, height: 34, borderRadius: 10, background: th.bg4, border: `1px solid ${t.color}33`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{p.logo}</div>
                                    <div style={{ flex: 1, color: th.text, fontSize: 13, fontWeight: 600 }}>{p.name}</div>
                                    <div style={{ color: th.text4, fontSize: 11 }}>{p.pts} puan</div>
                                </div>
                            ))}
                            {t.participants.length === 0 && <div style={{ textAlign: "center", color: th.text4, fontSize: 13, padding: "12px 0" }}>Henüz kayıt yok</div>}
                        </div>
                        {/* Register */}
                        {!locked && !regDone && !alreadyIn && (
                            <button onClick={() => { if (canReg) setRegDone(true); }} style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", background: canReg ? `linear-gradient(135deg,${t.color},${t.color}aa)` : "#222", color: canReg ? "#000" : th.text4, fontSize: 15, fontWeight: 800, cursor: canReg ? "pointer" : "not-allowed", fontFamily: "'Outfit',sans-serif", marginBottom: 8 }}>
                                {canReg ? "⚽ Kayıt Ol" : "Kayıt Kapalı"}
                            </button>
                        )}
                        {(regDone || alreadyIn) && <div style={{ width: "100%", padding: "16px", borderRadius: 16, background: `${t.color}18`, border: `1px solid ${t.color}44`, color: t.color, fontSize: 14, fontWeight: 700, textAlign: "center" }}>✅ Kayıt Tamamlandı!</div>}
                        {locked && <div style={{ width: "100%", padding: "16px", borderRadius: 16, background: "#111", border: "1px solid #222", color: "#555", fontSize: 14, fontWeight: 700, textAlign: "center" }}>🔒 Bu turnuvaya katılmak için {t.rankReq} seviyesi gerekli</div>}
                    </div>
                </div>
            );
        }


        // ── CONFIRM MODAL (generic) ────────────────────────────────────────────
        function ConfirmModal({ th, icon, title, desc, confirmText, confirmColor, onConfirm, onClose, children }) {
            return (
                <div style={{ position: "fixed", inset: 0, zIndex: 400, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,.75)", backdropFilter: "blur(10px)" }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <div style={{ width: "100%", maxWidth: 430, background: th.card, borderRadius: "24px 24px 0 0", padding: "24px 24px 40px", animation: "fadeUp .35s ease" }}>
                        <div style={{ width: 40, height: 4, borderRadius: 2, background: th.border3, margin: "0 auto 20px" }} />
                        <div style={{ textAlign: "center", marginBottom: 20 }}>
                            <div style={{ fontSize: 44, marginBottom: 12 }}>{icon}</div>
                            <div style={{ color: th.text, fontWeight: 800, fontSize: 18, marginBottom: 6 }}>{title}</div>
                            <div style={{ color: th.text4, fontSize: 13, lineHeight: 1.6 }}>{desc}</div>
                        </div>
                        {children}
                        <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
                            <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 14, border: `1px solid ${th.border}`, background: "transparent", color: th.text3, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>Vazgeç</button>
                            <button onClick={onConfirm} style={{ flex: 2, padding: "14px", borderRadius: 14, border: "none", background: confirmColor || th.acc, color: confirmColor ? "#fff" : th.accT, fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{confirmText}</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ── SETTINGS MODAL ─────────────────────────────────────────────────────
        function SettingsModal({ th, dark, setDark, onClose }) {
            const [view, setView] = React.useState("main");
            const [newEmail, setNewEmail] = React.useState("");
            const [emailPass, setEmailPass] = React.useState("");
            const [oldPass, setOldPass] = React.useState("");
            const [newPass, setNewPass] = React.useState("");
            const [newPass2, setNewPass2] = React.useState("");
            const [msg, setMsg] = React.useState({ text: "", ok: false });
            const [loading, setLoading] = React.useState(false);
            const [signOutConfirm, setSignOutConfirm] = React.useState(false);
            const S = { width: "100%", padding: "13px 15px", borderRadius: 12, border: `1px solid ${th.border2}`, background: th.inp, color: th.text, fontSize: 14, outline: "none", fontFamily: "'Outfit',sans-serif", marginBottom: 10 };

            function doEmailChange() {
                if (!newEmail || !emailPass) { setMsg({ text: "Tüm alanları doldur", ok: false }); return; }
                setLoading(true);
                const user = auth.currentUser;
                const cred = firebase.auth.EmailAuthProvider.credential(user.email, emailPass);
                user.reauthenticateWithCredential(cred)
                    .then(() => user.updateEmail(newEmail))
                    .then(() => { setMsg({ text: "✅ E-posta güncellendi!", ok: true }); setLoading(false); setTimeout(onClose, 1500); })
                    .catch(e => { setLoading(false); setMsg({ text: e.code === "auth/wrong-password" ? "Şifre hatalı" : e.code === "auth/invalid-email" ? "Geçersiz e-posta" : e.message, ok: false }); });
            }

            function doPassChange() {
                if (!oldPass || !newPass || !newPass2) { setMsg({ text: "Tüm alanları doldur", ok: false }); return; }
                if (newPass.length < 6) { setMsg({ text: "Yeni şifre en az 6 karakter olmalı", ok: false }); return; }
                if (newPass !== newPass2) { setMsg({ text: "Şifreler eşleşmiyor", ok: false }); return; }
                setLoading(true);
                const user = auth.currentUser;
                const cred = firebase.auth.EmailAuthProvider.credential(user.email, oldPass);
                user.reauthenticateWithCredential(cred)
                    .then(() => user.updatePassword(newPass))
                    .then(() => { setMsg({ text: "✅ Şifre güncellendi!", ok: true }); setLoading(false); setOldPass(""); setNewPass(""); setNewPass2(""); setTimeout(() => { setView("main"); setMsg({ text: "", ok: false }); }, 1500); })
                    .catch(e => { setLoading(false); setMsg({ text: e.code === "auth/wrong-password" ? "Mevcut şifre hatalı" : e.message, ok: false }); });
            }

            const Btn = ({ label, icon, sub, onClick, red }) => (
                <button onClick={onClick} style={{ width: "100%", display: "flex", alignItems: "center", gap: 14, padding: "14px 0", border: "none", borderBottom: `1px solid ${th.border}`, background: "transparent", cursor: "pointer", textAlign: "left" }}>
                    <span style={{ fontSize: 20, width: 28, textAlign: "center" }}>{icon}</span>
                    <div style={{ flex: 1 }}>
                        <div style={{ color: red ? "#f87171" : th.text, fontSize: 14, fontWeight: 600 }}>{label}</div>
                        {sub && <div style={{ color: th.text4, fontSize: 11, marginTop: 2 }}>{sub}</div>}
                    </div>
                    <span style={{ color: th.text4, fontSize: 16 }}>›</span>
                </button>
            );

            return (
                <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,.75)", backdropFilter: "blur(10px)" }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <div style={{ width: "100%", maxWidth: 430, background: th.card, borderRadius: "24px 24px 0 0", padding: "20px 22px 40px", animation: "fadeUp .35s ease" }}>
                        <div style={{ width: 40, height: 4, borderRadius: 2, background: th.border3, margin: "0 auto 20px" }} />

                        {view === "main" && <>
                            <div style={{ fontWeight: 800, fontSize: 20, color: th.text, marginBottom: 20 }}>Ayarlar</div>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 0", borderBottom: `1px solid ${th.border}` }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                                    <span style={{ fontSize: 20, width: 28, textAlign: "center" }}>{dark ? "🌙" : "☀️"}</span>
                                    <div><div style={{ color: th.text, fontSize: 14, fontWeight: 600 }}>{dark ? "Karanlık Mod" : "Aydınlık Mod"}</div><div style={{ color: th.text4, fontSize: 11, marginTop: 2 }}>Tema değiştir</div></div>
                                </div>
                                <button onClick={() => setDark(d => !d)} style={{ width: 50, height: 28, borderRadius: 14, border: "none", background: dark ? th.acc : "#333", cursor: "pointer", position: "relative", transition: "background .3s", flexShrink: 0 }}>
                                    <div style={{ position: "absolute", top: 3, left: dark ? 25 : 3, width: 22, height: 22, borderRadius: 11, background: dark ? "#000" : "#888", transition: "left .3s" }} />
                                </button>
                            </div>
                            <Btn icon="📧" label="E-posta Değiştir" sub={auth.currentUser?.email || "—"} onClick={() => { setView("email"); setMsg({ text: "", ok: false }); }} />
                            <Btn icon="🔐" label="Şifre Değiştir" onClick={() => { setView("password"); setMsg({ text: "", ok: false }); }} />
                            <Btn icon="🚪" label="Çıkış Yap" red={true} onClick={() => setSignOutConfirm(true)} />
                            <button onClick={onClose} style={{ width: "100%", marginTop: 18, padding: "14px", borderRadius: 14, border: `1px solid ${th.border}`, background: "transparent", color: th.text3, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>Kapat</button>
                        </>}

                        {view === "email" && <>
                            <button onClick={() => { setView("main"); setMsg({ text: "", ok: false }); }} style={{ background: "none", border: "none", color: th.acc, fontSize: 20, cursor: "pointer", marginBottom: 16, padding: 0 }}>←</button>
                            <div style={{ fontWeight: 800, fontSize: 18, color: th.text, marginBottom: 20 }}>E-posta Değiştir</div>
                            <input value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Yeni e-posta adresi" type="email" style={S} />
                            <input value={emailPass} onChange={e => setEmailPass(e.target.value)} placeholder="Mevcut şifren (doğrulama için)" type="password" style={{ ...S, marginBottom: 16 }} />
                            {msg.text && <div style={{ color: msg.ok ? "#4ade80" : "#f87171", fontSize: 12, marginBottom: 12, textAlign: "center", fontWeight: 600 }}>{msg.text}</div>}
                            <button onClick={doEmailChange} disabled={loading} style={{ width: "100%", padding: "14px", borderRadius: 14, border: "none", background: loading ? "#333" : th.acc, color: loading ? "#666" : th.accT, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{loading ? "Güncelleniyor..." : "Güncelle"}</button>
                        </>}

                        {view === "password" && <>
                            <button onClick={() => { setView("main"); setMsg({ text: "", ok: false }); }} style={{ background: "none", border: "none", color: th.acc, fontSize: 20, cursor: "pointer", marginBottom: 16, padding: 0 }}>←</button>
                            <div style={{ fontWeight: 800, fontSize: 18, color: th.text, marginBottom: 20 }}>Şifre Değiştir</div>
                            <input value={oldPass} onChange={e => setOldPass(e.target.value)} placeholder="Mevcut şifre" type="password" style={S} />
                            <input value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Yeni şifre" type="password" style={S} />
                            <input value={newPass2} onChange={e => setNewPass2(e.target.value)} onKeyDown={e => e.key === "Enter" && doPassChange()} placeholder="Yeni şifre (tekrar)" type="password" style={{ ...S, marginBottom: 16 }} />
                            {msg.text && <div style={{ color: msg.ok ? "#4ade80" : "#f87171", fontSize: 12, marginBottom: 12, textAlign: "center", fontWeight: 600 }}>{msg.text}</div>}
                            <button onClick={doPassChange} disabled={loading} style={{ width: "100%", padding: "14px", borderRadius: 14, border: "none", background: loading ? "#333" : th.acc, color: loading ? "#666" : th.accT, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{loading ? "Güncelleniyor..." : "Güncelle"}</button>
                        </>}

                        {signOutConfirm && <ConfirmModal th={th} icon="🚪" title="Çıkış Yapmak İstediğine Emin Misin?" desc="Hesabından çıkış yapılacak. Tekrar giriş yapabilirsin." confirmText="Çıkış Yap" confirmColor="#f87171" onConfirm={() => auth.signOut().then(() => window.location.reload())} onClose={() => setSignOutConfirm(false)} />}
                    </div>
                </div>
            );
        }
        // ── HOME TAB ──────────────────────────────────────────────────────────
        function HomeTab({ me, rnk, prog, nextRnk, matches, setTab, setActiveChat, setShowPrem, toggleDay, th, dark, tourneyRank, tourneyQualified, allBoard }) {
            const [infoIdx, setInfoIdx] = React.useState(0);
            const [homeTab, setHomeTab] = React.useState("main");
            const wr = me.played > 0 ? Math.round(me.wins / me.played * 100) : 0;
            const upcoming = matches.filter(m => m.confirmed && !m.result);
            const pending = matches.filter(m => !m.confirmed);
            const card = INFO_CARDS[infoIdx];
            const top8 = allBoard.slice(0, 8);
            const medals = ["🥇", "🥈", "🥉", "4️⃣", "5️⃣", "6️⃣", "7️⃣", "8️⃣"];
            return (
                <div style={{ height: "100%", display: "flex", flexDirection: "column", background: th.bg }}>
                    <div style={{ display: "flex", borderBottom: `1px solid ${th.border}`, flexShrink: 0, background: th.bg, alignItems: "center" }}>
                        <img src="logo.jpg" alt="FutMatch" style={{ width: 30, height: 30, borderRadius: "50%", objectFit: "cover", marginLeft: 14, flexShrink: 0, border: `1px solid ${th.border2}` }} />
                        {[["main", "🏠 Ana Sayfa"], ["tournaments", "🏆 Turnuvalar"]].map(([key, label]) => (
                            <button key={key} onClick={() => setHomeTab(key)} style={{ flex: 1, padding: "13px 8px", background: "none", border: "none", borderBottom: `2.5px solid ${homeTab === key ? th.acc : "transparent"}`, color: homeTab === key ? th.acc : th.text4, fontSize: 12, fontWeight: homeTab === key ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", letterSpacing: .5, transition: "all .2s" }}>{label}</button>
                        ))}
                    </div>
                    {homeTab === "tournaments" && <TournamentsTab me={me} rnk={rnk} th={th} dark={dark} />}
                    {homeTab === "main" && <div style={{ flex: 1, overflowY: "auto" }}>
                        {/* Hero card */}
                        <div style={{ margin: "14px 14px 0", background: th.hGrad, borderRadius: 22, border: `1px solid ${th.hBord}`, overflow: "hidden", position: "relative" }}>
                            <div style={{ position: "absolute", inset: 0, backgroundImage: `radial-gradient(circle at 80% 20%, ${th.acc}18 0%, transparent 60%)`, pointerEvents: "none" }} />
                            <div style={{ padding: "18px 18px 14px", position: "relative" }}>
                                <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                                    <div style={{ width: 70, height: 70, borderRadius: 18, background: th.bg4, border: `1px solid ${th.hBord}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 38, flexShrink: 0 }}>{me.logo}</div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 22, color: th.text, letterSpacing: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{me.name}</div>
                                            {me.isPremium && <span style={{ background: "rgba(245,242,52,.15)", border: "1px solid rgba(245,242,52,.4)", borderRadius: 6, padding: "1px 6px", color: th.acc, fontSize: 10, fontWeight: 700 }}>PRO</span>}
                                        </div>
                                        <div style={{ color: th.text3, fontSize: 12, marginBottom: 8 }}>📍 {me.city} · {me.district}</div>
                                        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                                            <span style={{ padding: "3px 10px", borderRadius: 20, border: `1px solid ${th.border}`, color: th.text3, fontSize: 11 }}>{me.level}</span>
                                            <span style={{ padding: "3px 10px", borderRadius: 20, border: `1px solid ${th.border}`, color: th.text3, fontSize: 11 }}>{me.players} kişi</span>
                                            <span style={{ padding: "3px 10px", borderRadius: 20, border: `1px solid ${rnk.color}`, color: rnk.color, fontSize: 11 }}>{rnk.icon} {rnk.label}</span>
                                        </div>
                                    </div>
                                </div>
                                <div style={{ marginTop: 13 }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                        <span style={{ color: th.text4, fontSize: 10, letterSpacing: 1 }}>{me.points} PUAN</span>
                                        {nextRnk && <span style={{ color: th.text4, fontSize: 10 }}>→ {nextRnk.label} ({nextRnk.min})</span>}
                                    </div>
                                    <div style={{ height: 4, background: th.border, borderRadius: 2, overflow: "hidden" }}>
                                        <div style={{ height: "100%", width: `${prog}%`, background: `linear-gradient(90deg,${th.acc},${dark ? "#fff" : "#222"})`, borderRadius: 2, transition: "width .6s" }} />
                                    </div>
                                </div>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", borderTop: `1px solid ${th.hBord}` }}>
                                {[["G", me.wins, "#4ade80"], ["B", me.draws, th.text3], ["M", me.losses, "#f87171"], ["Oran", `%${wr}`, th.acc]].map(([l, v, c]) => (
                                    <div key={l} style={{ padding: "11px 8px", textAlign: "center", borderRight: `1px solid ${th.hBord}` }}>
                                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 21, color: c, letterSpacing: 1 }}>{v}</div>
                                        <div style={{ color: th.text4, fontSize: 9, letterSpacing: 2, marginTop: 1 }}>{l}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        {/* Info card */}
                        <div style={{ padding: "14px 14px 0" }}>
                            <div style={{ background: dark ? "rgba(0,0,0,.4)" : "rgba(255,255,255,.8)", border: `1px solid ${card.color}44`, borderRadius: 18, padding: "14px 16px", position: "relative", overflow: "hidden" }}>
                                <div style={{ position: "absolute", top: -16, right: -10, fontSize: 60, opacity: .07, pointerEvents: "none" }}>{card.icon}</div>
                                <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
                                    <span style={{ fontSize: 20, flexShrink: 0 }}>{card.icon}</span>
                                    <div style={{ color: card.color, fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", lineHeight: 1.4 }}>{card.title}</div>
                                </div>
                                <div style={{ color: th.text2, fontSize: 12, lineHeight: 1.75 }}>{card.body}</div>
                                <div style={{ display: "flex", gap: 5, marginTop: 12, alignItems: "center", justifyContent: "space-between" }}>
                                    <div style={{ display: "flex", gap: 5 }}>
                                        {INFO_CARDS.map((_, i) => <div key={i} onClick={() => setInfoIdx(i)} style={{ width: i === infoIdx ? 18 : 6, height: 6, borderRadius: 3, background: i === infoIdx ? card.color : th.border3, cursor: "pointer", transition: "all .25s" }} />)}
                                    </div>
                                    <button onClick={() => setInfoIdx(i => (i + 1) % INFO_CARDS.length)} style={{ background: "transparent", border: `1px solid ${card.color}66`, borderRadius: 8, padding: "4px 10px", color: card.color, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Sonraki →</button>
                                </div>
                            </div>
                        </div>
                        {/* Upcoming */}
                        {upcoming.length > 0 && <div style={{ padding: "14px 14px 0" }}>
                            <SecTit th={th}>YAKLAŞAN MAÇLAR</SecTit>
                            {upcoming.map(m => (
                                <div key={m.id} onClick={() => { setActiveChat(m.chatId); setTab("discover"); }} style={{ background: dark ? "#0e1a0e" : "#f0fff4", border: `1px solid ${dark ? "#1a3a1a" : "#bbf7d0"}`, borderRadius: 16, padding: "14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center", cursor: "pointer" }}>
                                    <div style={{ fontSize: 26 }}>{m.team.logo}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ color: th.text, fontWeight: 700, fontSize: 14 }}>{m.team.name}</div>
                                        {m.scheduledTime && <div style={{ color: "#4ade80", fontSize: 12, marginTop: 2 }}>🗓 {new Date(m.scheduledTime).toLocaleString("tr-TR", { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</div>}
                                    </div>
                                    <span style={{ color: "#4ade80" }}>›</span>
                                </div>
                            ))}
                        </div>}
                        {/* Pending */}

                                <div style={{ padding: "14px 16px 0", display: "flex", alignItems: "center", gap: 10 }}>
                                    <div style={{ width: 46, height: 46, borderRadius: 14, background: "rgba(245,242,52,.12)", border: "1px solid rgba(245,242,52,.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>🏆</div>
                                    <div>
                                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 20, color: th.acc, letterSpacing: 2, lineHeight: 1 }}>FUTMATCH TURNUVASI</div>
                                        <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1, marginTop: 2 }}>Sezon Sonu · İlk 8 Takım</div>
                                    </div>
                                </div>
                                <div style={{ padding: "10px 14px" }}>
                                    <div style={{ padding: "10px 12px", borderRadius: 12, background: tourneyQualified ? "rgba(74,222,128,.1)" : "rgba(248,113,113,.08)", border: `1px solid ${tourneyQualified ? "rgba(74,222,128,.35)" : "rgba(248,113,113,.3)"}` }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                            <span style={{ fontSize: 18 }}>{tourneyQualified ? "✅" : "⏳"}</span>
                                            <div>
                                                <div style={{ color: tourneyQualified ? "#4ade80" : "#f87171", fontSize: 12, fontWeight: 800 }}>{tourneyQualified ? `Katılım hakkı kazandın — #${tourneyRank}. sıradasın` : `Şu an #${tourneyRank}. sıradasın — maç kazan!`}</div>

                                    <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1.5, fontWeight: 700, marginBottom: 8 }}>MEVCUT TABLO</div>
                                    {top8.map((t, i) => {
                                        const isMe = t.id === me.id; const tRnk = getRank(t.points); return (
                                            <div key={t.id || i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 6px", borderBottom: i < 7 ? `1px solid ${th.border}` : "", background: isMe ? `${th.acc}08` : "transparent", borderRadius: isMe ? 8 : 0 }}>
                                                <span style={{ fontSize: 13, width: 20, textAlign: "center" }}>{medals[i]}</span>
                                                <span style={{ fontSize: 17 }}>{t.logo}</span>
                                                <span style={{ flex: 1, color: isMe ? th.acc : th.text, fontSize: 12, fontWeight: isMe ? 800 : 600 }}>{t.name || "Takımım"}{isMe ? " (Sen)" : ""}</span>
                                                <span style={{ color: tRnk.color, fontSize: 10 }}>{tRnk.icon}</span>
                                                <span style={{ color: th.text3, fontSize: 12, fontWeight: 700, minWidth: 30, textAlign: "right" }}>{t.points}</span>

                                <div style={{ padding: "12px 16px 14px", display: "flex", gap: 8 }}>
                                    {[["⚽", "8 Takım", "Eleme"], ["🥊", "Çeyrek", "4 Maç"], ["🏅", "Final", "Tek Maç"]].map(([ic, t, s]) => (
                                        <div key={t} style={{ flex: 1, textAlign: "center", background: dark ? "rgba(255,255,255,.03)" : "rgba(0,0,0,.03)", borderRadius: 10, padding: "8px 4px", border: `1px solid ${th.border}` }}>
                                            <div style={{ fontSize: 17, marginBottom: 4 }}>{ic}</div>
                                            <div style={{ color: th.text, fontSize: 10, fontWeight: 700 }}>{t}</div>

                        <div style={{ padding: "14px 14px 28px" }}>
                            {!me.isPremium && <button onClick={() => setShowPrem(true)} style={{ width: "100%", padding: "13px", borderRadius: 14, border: `1px solid ${th.border3}`, background: "transparent", color: th.text2, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>⚡ Premium'a Geç</button>}

        // ── APP ROOT ──────────────────────────────────────────────────────────

        // ── LOGIN SCREEN ──────────────────────────────────────────────────────
        function LoginScreen({ onSuccess }) {
            const [mode, setMode] = React.useState("login");
            const [email, setEmail] = React.useState("");
            const [pass, setPass] = React.useState("");
            const [err, setErr] = React.useState("");
            const [loading, setLoading] = React.useState(false);
            const S = { width: "100%", padding: "14px 16px", borderRadius: 14, border: "1px solid #252525", background: "#0d0d0d", color: "#fff", fontSize: 14, outline: "none", fontFamily: "'Outfit',sans-serif", marginBottom: 12 };
            function handleSubmit() {
                setErr("");
                if (!email.trim() || !pass) { setErr("E-posta ve sifre zorunlu"); return; }
                if (pass.length < 6) { setErr("Sifre en az 6 karakter olmali"); return; }
                setLoading(true);
                const fn = mode === "register"
                    ? auth.createUserWithEmailAndPassword(email.trim(), pass)
                    : auth.signInWithEmailAndPassword(email.trim(), pass);
                fn.then(() => { setLoading(false); onSuccess(); }).catch(e => {
                    setLoading(false);
                    const msgs = { "auth/email-already-in-use": "Bu e-posta zaten kayitli", "auth/user-not-found": "Kullanici bulunamadi", "auth/wrong-password": "Sifre yanlis", "auth/invalid-email": "Gecersiz e-posta", "auth/weak-password": "Sifre cok zayif", "auth/invalid-credential": "E-posta veya sifre hatali", "auth/network-request-failed": "Baglanti hatasi" };
                    setErr(msgs[e.code] || e.message);
                });
            }
            return (
                <div style={{ width: "100%", maxWidth: 430, height: "100dvh", margin: "0 auto", background: "#000", display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
                    <div style={{ position: "absolute", inset: 0, backgroundImage: "radial-gradient(circle at 50% 30%, rgba(245,242,52,.06) 0%, transparent 65%)", pointerEvents: "none" }} />
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "32px 24px", animation: "fadeUp .5s ease" }}>
                        <div style={{ textAlign: "center", marginBottom: 36 }}>
                            <div style={{ fontSize: 52, marginBottom: 10, animation: "heartbeat 2s ease infinite" }}>{"⚽"}</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 54, lineHeight: 1, letterSpacing: 4, color: "#fff" }}>FUT</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 54, lineHeight: 1, letterSpacing: 4, color: "#F5F234", marginTop: -4 }}>MATCH</div>
                            <div style={{ width: 50, height: 2, background: "linear-gradient(90deg,transparent,#F5F234,transparent)", margin: "14px auto" }} />
                            <div style={{ color: "#555", fontSize: 11, letterSpacing: 4, fontWeight: 600 }}>{mode === "register" ? "HESAP OLUSTUR" : "HOS GELDIN"}</div>
                        </div>
                        <div style={{ display: "flex", background: "#0d0d0d", borderRadius: 14, border: "1px solid #1a1a1a", padding: 4, marginBottom: 24 }}>
                            {[["login", "Giris Yap"], ["register", "Kayit Ol"]].map(([m, l]) => (
                                <button key={m} onClick={() => { setMode(m); setErr(""); }} style={{ flex: 1, padding: "10px", borderRadius: 11, border: "none", background: mode === m ? "#F5F234" : "transparent", color: mode === m ? "#000" : "#555", fontSize: 13, fontWeight: mode === m ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>{l}</button>
                            ))}
                        </div>
                        <input value={email} onChange={e => setEmail(e.target.value)} placeholder="E-posta adresi" type="email" autoComplete="email" style={S} />
                        <input value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()} placeholder="Sifre (en az 6 karakter)" type="password" style={S} />
                        {err && <div style={{ color: "#f87171", fontSize: 12, marginBottom: 12, textAlign: "center", fontWeight: 600 }}>{"⚠️ " + err}</div>}
                        <button onClick={handleSubmit} disabled={loading} style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: loading ? "#222" : "#F5F234", color: loading ? "#555" : "#000", fontSize: 15, fontWeight: 800, cursor: loading ? "default" : "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .2s", marginTop: 4 }}>
                            {loading ? "Lutfen bekle..." : (mode === "register" ? "Hesap Olustur ->" : "Giris Yap ->")}
                        </button>
                    </div>
                </div>
            );
        }
        // ── APP ROOT (FIREBASE) ───────────────────────────────────────────────
        function App() {
            const [screen, setScreen] = React.useState("splash");
            const [dark, setDark] = React.useState(true);
            const [me, setMe] = React.useState(null);
            const [uid, setUid] = React.useState(null);
            const [tab, setTab] = React.useState("home");
            const [teamList, setTeamList] = React.useState([]);
            const [swipedIds, setSwipedIds] = React.useState(new Set());
            const [matches, setMatches] = React.useState([]);
            const [chats, setChats] = React.useState({});
            const [activeChat, setActiveChat] = React.useState(null);
            const [popup, setPopup] = React.useState(null);
            const [showPrem, setShowPrem] = React.useState(false);
            const [toastMsg, setToastMsg] = React.useState(null);
            const [swipeDir, setSwipeDir] = React.useState(null);
            const [floatPts, setFloatPts] = React.useState(null);
            const injectedRef = React.useRef(new Set());
            const teamListRef = React.useRef([]);
            const th = mkTheme(dark);

            function navigateAfterAuth(userId) {
                setUid(userId);
                db.collection("teams").doc(userId).get().then(snap => {
                    if (snap.exists) { setMe({ ...snap.data(), id: userId }); setScreen("home"); }
                    else setScreen("onboard");
                }).catch(() => setScreen("onboard"));
            }

            React.useEffect(() => {
                const fallback = setTimeout(() => setScreen(s => s === "splash" ? "auth" : s), 5000);
                let unsubbed = false;
                const unsub = auth.onAuthStateChanged(user => {
                    if (unsubbed) return;
                    clearTimeout(fallback);
                    if (user) { setTimeout(() => navigateAfterAuth(user.uid), 2400); }
                    else setTimeout(() => setScreen("auth"), 2400);
                });
                return () => { unsubbed = true; clearTimeout(fallback); unsub(); };
            }, []);

            React.useEffect(() => {
                if (!uid) return;
                const unsub = db.collection("teams").orderBy("points", "desc").onSnapshot(snap => {
                    const list = [];
                    snap.forEach(doc => { if (doc.id !== uid) list.push({ ...doc.data(), id: doc.id }); });
                    setTeamList(list);
                    teamListRef.current = list;
                }, () => { });
                return () => unsub();
            }, [uid]);

            React.useEffect(() => {
                if (!uid) return;
                const unsub = db.collection("swipes").doc(uid).collection("records").onSnapshot(snap => {
                    const ids = new Set();
                    snap.forEach(doc => ids.add(doc.id));
                    setSwipedIds(ids);
                }, () => { });
                return () => unsub();
            }, [uid]);

            React.useEffect(() => {
                if (!uid) return;
                const unsub = db.collection("matches").where("participants", "array-contains", uid).orderBy("createdAt", "desc").onSnapshot(snap => {
                    const list = [];
                    snap.forEach(doc => {
                        const d = doc.data();
                        const otherId = (d.participants || []).find(p => p !== uid);
                        const teamData = teamListRef.current.find(t => t.id === otherId) || d.team || { name: "Rakip", logo: "⚽" };
                        list.push({ ...d, id: doc.id, chatId: doc.id, team: teamData });
                    });
                    setMatches(list);
                }, () => { });
                return () => unsub();
            }, [uid]);

            React.useEffect(() => {
                if (!activeChat || !uid) return;
                const unsub = db.collection("matches").doc(activeChat).collection("messages").orderBy("ts", "asc").onSnapshot(snap => {
                    const msgs = [];
                    snap.forEach(doc => msgs.push({ ...doc.data(), id: doc.id, ts: doc.data().ts?.toDate?.() || new Date() }));
                    setChats(c => ({ ...c, [activeChat]: msgs }));
                }, () => { });
                return () => unsub();
            }, [activeChat, uid]);

            React.useEffect(() => {
                const iv = setInterval(() => {
                    const now = Date.now();
                    setMatches(ms => ms.map(m => {
                        if (m.confirmed && m.scheduledTime && !m.resultAsked && !m.result) {
                            if (now >= new Date(m.scheduledTime).getTime() + 60000) {
                                if (uid) db.collection("matches").doc(m.id).update({ resultAsked: true }).catch(() => { });
                                return { ...m, resultAsked: true };
                            }
                        }
                        return m;
                    }));
                }, 5000);
                return () => clearInterval(iv);
            }, []);

            React.useEffect(() => {
                matches.forEach(m => {
                    if (m.resultAsked && !m.result && !injectedRef.current.has(m.id)) {
                        injectedRef.current.add(m.id);
                        const req = { id: "result_" + m.id, from: "system", type: "result_request", matchId: m.id, chatId: m.chatId, ts: new Date(), myVote: null, opVote: null, confirmed: false };
                        setChats(c => ({ ...c, [m.chatId]: [...(c[m.chatId] || []), req] }));
                    }
                });
            }, [matches]);

            function toast(msg, type = "info") { setToastMsg({ msg, type }); setTimeout(() => setToastMsg(null), 3000); }

            function addPts(n) {
                setMe(m => ({ ...m, points: (m.points || 0) + n }));
                setFloatPts(n);
                setTimeout(() => setFloatPts(null), 1500);
                if (uid) db.collection("teams").doc(uid).update({ points: FV.increment(n) }).catch(() => { });
            }

            function toggleDay(d) {
                setMe(m => {
                    const a = m.avail || [];
                    const newAvail = a.includes(d) ? a.filter(x => x !== d) : [...a, d];
                    if (uid) db.collection("teams").doc(uid).update({ avail: newAvail }).catch(() => { });
                    return { ...m, avail: newAvail };
                });
            }

            function updateMe(f) {
                setMe(m => ({ ...m, ...f }));
                if (uid) db.collection("teams").doc(uid).update(f).catch(() => { });
            }

            function saveTeamToFirestore(profile) {
                const data = { ...profile, wins: 0, losses: 0, draws: 0, points: 0, played: 0, rating: 0, isPremium: false };
                setMe({ ...data, id: uid || "local" });
                setScreen("home");
                if (uid) {
                    db.collection("teams").doc(uid).set({ ...data, id: uid, createdAt: FV.serverTimestamp() }).catch(e => console.error(e));
                }
            }

            const unswiped = teamList.filter(t => !swipedIds.has(t.id));
            const top = unswiped[0];
            const myInitiated = matches.filter(m => m.incoming === false).length;

            function doSwipe(dir) {
                if (!top) return;
                const like = dir === "right" || dir === "super";
                if (like && myInitiated >= 1 && !me?.isPremium) { setShowPrem(true); return; }
                setSwipeDir(dir === "super" ? "right" : dir);
                if (uid) db.collection("swipes").doc(uid).collection("records").doc(top.id).set({ direction: dir, ts: FV.serverTimestamp() }).catch(() => { });
                setTimeout(() => {
                    setSwipeDir(null);
                    if (like) {
                        if (Math.random() > 0.3) {
                            const matchId = (uid || "local") + "_" + top.id;
                            const matchData = { participants: [uid || "local", top.id], team: { ...top }, confirmed: false, result: null, scheduledTime: null, resultAsked: false, incoming: false, myResult: null, opResult: null, resultConfirmed: false, superLike: dir === "super", createdAt: FV.serverTimestamp() };
                            if (uid) db.collection("matches").doc(matchId).set(matchData, { merge: true }).catch(() => { });
                            setMatches(ms => [...ms.filter(m => m.id !== matchId), { ...matchData, id: matchId, chatId: matchId, createdAt: new Date() }]);
                            setChats(c => ({ ...c, [matchId]: c[matchId] || [] }));
                            setPopup(top);
                            addPts(dir === "super" ? 60 : 35);
                        } else { toast("Henuz eslesme yok..."); addPts(5); }
                    }
                }, 400);
            }

            function sendMsg(chatId, text, type, payload) {
                const msg = { from: "me", text, type: type || "text", payload: payload || null, ts: FV.serverTimestamp() };
                if (uid) db.collection("matches").doc(chatId).collection("messages").add(msg).catch(() => { });
                setChats(c => ({ ...c, [chatId]: [...(c[chatId] || []), { ...msg, id: "local_" + Date.now(), ts: new Date() }] }));
                if (type === "match_invite") return;
                setTimeout(() => {
                    const autos = ["Ne zaman uygunuz?", "Saha bizde olabilir.", "Cumartesi nasil?", "Tamam!", "Kacar kisisiniz?"];
                    const auto = { from: "them", text: autos[Math.floor(Math.random() * 5)], type: "text", payload: null, ts: FV.serverTimestamp() };
                    if (uid) db.collection("matches").doc(chatId).collection("messages").add(auto).catch(() => { });
                    setChats(c => ({ ...c, [chatId]: [...(c[chatId] || []), { ...auto, id: "auto_" + Date.now(), ts: new Date() }] }));
                }, 1200);
            }

            function acceptInvite(chatId, msgId, payload) {
                setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(m => m.id === msgId ? { ...m, payload: { ...m.payload, accepted: true, rejected: false } } : m) }));
                const idx = matches.findIndex(m => m.chatId === chatId);
                if (idx >= 0) {
                    const upd = { confirmed: true, scheduledTime: payload.datetime };
                    setMatches(ms => ms.map((m, i) => i === idx ? { ...m, ...upd } : m));
                    if (uid) db.collection("matches").doc(chatId).update(upd).catch(() => { });
                    addPts(100); toast("Mac onaylandi! +100 puan", "success");
                    const autoMsg = { from: "them", text: "Harika! Sahada gorusuruz!", type: "text", payload: null, ts: FV.serverTimestamp() };
                    if (uid) db.collection("matches").doc(chatId).collection("messages").add(autoMsg).catch(() => { });
                }
            }

            function rejectInvite(chatId, msgId) {
                setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(m => m.id === msgId ? { ...m, payload: { ...m.payload, rejected: true, accepted: false } } : m) }));
                const r1 = { from: "me", text: "Bu tarihe musait degiliz. Baska tarih onerir misiniz?", type: "text", payload: null, ts: FV.serverTimestamp() };
                if (uid) db.collection("matches").doc(chatId).collection("messages").add(r1).catch(() => { });
                setTimeout(() => {
                    const r2 = { from: "them", text: "Tabii, pazar gunu nasil olur?", type: "text", payload: null, ts: FV.serverTimestamp() };
                    if (uid) db.collection("matches").doc(chatId).collection("messages").add(r2).catch(() => { });
                    setChats(c => ({ ...c, [chatId]: [...(c[chatId] || []), { ...r2, id: "auto_" + Date.now(), ts: new Date() }] }));
                }, 1500);
            }

            function voteResult(chatId, msgId, matchId, vote) {
                setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(msg => msg.id === msgId ? { ...msg, myVote: vote } : msg) }));
                setTimeout(() => {
                    const opVote = vote === "win" ? "loss" : vote === "loss" ? "win" : "draw";
                    setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(msg => msg.id === msgId ? { ...msg, opVote, confirmed: true } : msg) }));
                    const upd = { result: vote, myResult: vote, opResult: opVote, resultConfirmed: true };
                    setMatches(ms => ms.map(m => m.id === matchId ? { ...m, ...upd } : m));
                    if (uid) db.collection("matches").doc(matchId).update(upd).catch(() => { });
                    if (vote === "win") { setMe(m => ({ ...m, wins: (m.wins || 0) + 1, played: (m.played || 0) + 1 })); if (uid) db.collection("teams").doc(uid).update({ wins: FV.increment(1), played: FV.increment(1) }).catch(() => { }); addPts(200); toast("Galibiyet! +200", "success"); }
                    else if (vote === "draw") { setMe(m => ({ ...m, draws: (m.draws || 0) + 1, played: (m.played || 0) + 1 })); if (uid) db.collection("teams").doc(uid).update({ draws: FV.increment(1), played: FV.increment(1) }).catch(() => { }); addPts(50); toast("Beraberlik +50", "success"); }
                    else { setMe(m => ({ ...m, losses: (m.losses || 0) + 1, played: (m.played || 0) + 1 })); if (uid) db.collection("teams").doc(uid).update({ losses: FV.increment(1), played: FV.increment(1) }).catch(() => { }); addPts(20); toast("Maglubiyet +20", "info"); }
                }, 2500);
            }

            if (screen === "splash") return <Splash />;
            if (screen === "auth") return <LoginScreen onSuccess={() => { const u = auth.currentUser; if (u) navigateAfterAuth(u.uid); }} />;
            if (screen === "onboard" || !me) return <Onboarding th={th} onComplete={saveTeamToFirestore} />;

            const rnk = getRank(me.points || 0);
            const nextRnk = RANKS.find(l => l.min > (me.points || 0));
            const prog = nextRnk ? Math.min(100, (((me.points || 0) - rnk.min) / (nextRnk.min - rnk.min)) * 100) : 100;
            const pendingBadge = matches.filter(m => !m.confirmed).length;
            const allBoard = [...teamList, { ...me, id: uid || "local" }].sort((a, b) => (b.points || 0) - (a.points || 0));
            const myRankGlobal = allBoard.findIndex(t => t.id === (uid || "local")) + 1;
            const tourneyQualified = myRankGlobal >= 1 && myRankGlobal <= 8;

            return (
                <div style={{ width: "100%", maxWidth: 430, height: "100dvh", margin: "0 auto", display: "flex", flexDirection: "column", overflow: "hidden", position: "relative", background: th.bg, color: th.text }}>
                    {toastMsg && <Toast msg={toastMsg.msg} type={toastMsg.type} th={th} />}
                    {floatPts && <div style={{ position: "fixed", top: "36%", left: "50%", zIndex: 400, fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 44, color: th.acc, pointerEvents: "none", animation: "floatUp 1.2s ease forwards", letterSpacing: 2 }}>+{floatPts}</div>}
                    {popup && <MatchPopup team={popup} me={me} th={th} onChat={() => { setPopup(null); setActiveChat(popup.id); setTab("discover"); }} onClose={() => setPopup(null)} />}
                    {showPrem && <PremiumModal th={th} onActivate={() => { setMe(m => ({ ...m, isPremium: true })); setShowPrem(false); toast("Premium aktif!", "success"); }} onClose={() => setShowPrem(false)} />}
                    <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", minHeight: 0 }}>
                        {tab === "home" && <HomeTab me={me} rnk={rnk} prog={prog} nextRnk={nextRnk} matches={matches} setTab={setTab} setActiveChat={setActiveChat} setShowPrem={setShowPrem} toggleDay={toggleDay} th={th} dark={dark} tourneyRank={myRankGlobal} tourneyQualified={tourneyQualified} allBoard={allBoard} />}
                        {tab === "discover" && (activeChat != null
                            ? <ChatScreen chatId={activeChat} matches={matches} chats={chats} sendMsg={sendMsg} acceptInvite={acceptInvite} rejectInvite={rejectInvite} voteResult={voteResult} onBack={() => setActiveChat(null)} th={th} dark={dark} />
                            : <DiscoverTab me={me} top={top} unswiped={unswiped} swipeDir={swipeDir} doSwipe={doSwipe} rnk={rnk} prog={prog} matches={matches} setActiveChat={setActiveChat} th={th} dark={dark} />
                        )}
                        {tab === "matches" && <MatchesTab matches={matches} onChat={id => { setActiveChat(id); setTab("discover"); }} th={th} />}
                        {tab === "leaderboard" && <LeaderTab me={me} all={allBoard} th={th} dark={dark} />}
                        {tab === "profile" && <ProfileTab me={me} rnk={rnk} prog={prog} nextRnk={nextRnk} setShowPrem={setShowPrem} updateMe={updateMe} toggleDay={toggleDay} th={th} dark={dark} setDark={setDark} />}
                    </div>
                    <BotNav tab={tab} setTab={t => { if (t !== "discover") setActiveChat(null); setTab(t); }} badge={pendingBadge} th={th} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
