                        {err && <div style={{ color: "#f87171", fontSize: 12, marginTop: 16, textAlign: "center", fontWeight: 600 }}>⚠️ {err}</div>}

                        <div style={{ marginTop: 28, textAlign: "center", color: "#333", fontSize: 11, lineHeight: 1.7 }}>
                            Devam ederek{" "}
                            <span onClick={() => setShowAgreement(true)} style={{ color: "#aaa", textDecoration: "underline", cursor: "pointer" }}>Kullanıcı Sözleşmesi</span>
                            {" "}ve{" "}
                            <span onClick={() => setShowAgreement(true)} style={{ color: "#aaa", textDecoration: "underline", cursor: "pointer" }}>Gizlilik/Veri İşleme</span>
                            {" "}kabul edilmiş sayılır.
                        </div>
                    </div>
                </div>
            );
        }
        // ── ERROR BOUNDARY ────────────────────────────────────────────────────
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error('[FutMatch] Render hatası:', error, info); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ width: "100%", maxWidth: 430, height: "100dvh", margin: "0 auto", background: "#000", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, fontFamily: "'Outfit',sans-serif" }}>
                            <div style={{ fontSize: 48, marginBottom: 16 }}>⚽</div>
                            <div style={{ color: "#fff", fontWeight: 900, fontSize: 22, marginBottom: 8 }}>Bir şeyler ters gitti</div>
                            <div style={{ color: "#555", fontSize: 13, marginBottom: 32, textAlign: "center" }}>Uygulama beklenmedik bir hatayla karşılaştı.</div>
                            <button onClick={() => { this.setState({ hasError: false, error: null }); window.location.reload(); }}
                                style={{ padding: "14px 28px", background: "#F5F234", color: "#000", border: "none", borderRadius: 14, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
                                Yeniden Başlat
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ── APP ROOT (FIREBASE) ───────────────────────────────────────────────
        function App() {
            const [screen, setScreen] = React.useState("splash");
            const [dark, setDark] = React.useState(true);
            const [me, setMe] = React.useState(null);
            const [uid, setUid] = React.useState(null);
            const [tab, setTab] = React.useState("home");
            const [teamList, setTeamList] = React.useState([]);
            const [swipeMap, setSwipeMap] = React.useState(new Map()); // teamId -> { direction, tsMs }
            const [matches, setMatches] = React.useState([]);
            const [chats, setChats] = React.useState({});
            const [activeChat, setActiveChat] = React.useState(null);
            const [popup, setPopup] = React.useState(null);
            const [showPrem, setShowPrem] = React.useState(false);
            const [toastMsg, setToastMsg] = React.useState(null);
            const [swipeDir, setSwipeDir] = React.useState(null);
            const [localSwiped, setLocalSwiped] = React.useState(new Set());
            const [floatPts, setFloatPts] = React.useState(null);
            const injectedRef = React.useRef(new Set());
            const teamListRef = React.useRef([]);
            const initialMatchesLoadedRef = React.useRef(false);
            const [nowTick, setNowTick] = React.useState(Date.now());
            const [blockedIds, setBlockedIds] = React.useState(new Set());
            const th = mkTheme(dark);

            React.useEffect(() => {
                const id = setInterval(() => setNowTick(Date.now()), 30 * 1000);
                return () => clearInterval(id);
            }, []);

            function navigateAfterAuth(userId) {
                setUid(userId);
                const hangGuard = setTimeout(() => setScreen("onboard"), 8000);
                db.collection("teams").doc(userId).get().then(snap => {
                    clearTimeout(hangGuard);
                    if (snap.exists) { setMe({ ...snap.data(), id: userId }); setScreen("home"); }
                    else setScreen("onboard");
                }).catch(() => { clearTimeout(hangGuard); setScreen("onboard"); });
            }

            React.useEffect(() => {
                auth.getRedirectResult().then(result => {
                    if (result && result.user) {
                        navigateAfterAuth(result.user.uid);
                    }
                }).catch(() => { });
            }, []);

            const currentScreenRef = React.useRef("splash");
            React.useEffect(() => { currentScreenRef.current = screen; }, [screen]);

            React.useEffect(() => {
                const fallback = setTimeout(() => setScreen(s => s === "splash" ? "auth" : s), 5000);
                let unsubbed = false;
                let navigated = false;
                let authScreenTimer = null;
                const unsub = auth.onAuthStateChanged(user => {
                    if (unsubbed) return;
                    clearTimeout(fallback);
                    if (user) {
                        if (authScreenTimer) { clearTimeout(authScreenTimer); authScreenTimer = null; }
                        if (!navigated) {
                            navigated = true;
                            // Splash'teyken animasyon süresini bekle; login/diğer ekranlarda anında geç
                            const delay = currentScreenRef.current === "splash" ? 2400 : 0;
                            setTimeout(() => navigateAfterAuth(user.uid), delay);
                        }
                    } else {
                        authScreenTimer = setTimeout(() => setScreen("auth"), 2400);
                    }
                });
                return () => {
                    unsubbed = true;
                    clearTimeout(fallback);
                    if (authScreenTimer) clearTimeout(authScreenTimer);
                    unsub();
                };
            }, []);

            React.useEffect(() => {
                if (!uid) return;
                // Uygulama açılınca lastSeen güncelle (silinmiş kullanıcıları filtrelemek için)
                db.collection("teams").doc(uid).update({ lastSeen: FV.serverTimestamp() }).catch(() => { });
                const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
                const unsub = db.collection("teams").orderBy("points", "desc").onSnapshot(snap => {
                    const list = [];
                    const blocked = blockedIds;
                    snap.forEach(doc => {
                        if (doc.id !== uid) {
                            const d = doc.data();
                            if (!d.name) return;
                            if (blocked.has(doc.id)) return;
                            const lastSeen = d.lastSeen?.toDate?.();
                            const createdAt = d.createdAt?.toDate?.();
                            const lastActivity = lastSeen || createdAt;
                            if (!lastActivity || lastActivity < thirtyDaysAgo) return;
                            list.push({ ...d, id: doc.id });
                        }
                    });
                    setTeamList(list);
                    teamListRef.current = list;
                }, () => { });
                return () => unsub();
            }, [uid]);

            React.useEffect(() => {
                if (!uid) return;
                const unsub = db.collection("blocks").doc(uid).onSnapshot(snap => {
                    const data = snap.data() || {};
                    setBlockedIds(new Set(data.blocked || []));
                }, () => {});
                return () => unsub();
            }, [uid]);

            function onBlock(targetId) {
                if (!uid || !targetId) return;
                db.collection("blocks").doc(uid).set({ blocked: FV.arrayUnion(targetId) }, { merge: true }).catch(() => {});
                setBlockedIds(prev => new Set([...prev, targetId]));
            }

            React.useEffect(() => {
                if (!uid) return;
                const unsub = db.collection("swipes").doc(uid).collection("records").onSnapshot(snap => {
                    const m = new Map();
                    snap.forEach(doc => {
                        const d = doc.data() || {};
                        const dir = d.direction || null;
                        const tsMs = d.ts?.toDate?.()?.getTime?.() || Date.now();
                        m.set(doc.id, { direction: dir, tsMs });
                    });
                    setSwipeMap(m);
                    // Firestore onaylayınca localSwiped'dan temizle
                    setLocalSwiped(prev => { const n = new Set([...prev].filter(id => !m.has(id))); return n.size === prev.size ? prev : n; });
                }, () => { });
                return () => unsub();
            }, [uid]);

            React.useEffect(() => {
                if (!uid) return;
                const unsub = db.collection("matches").where("participants", "array-contains", uid).onSnapshot(snap => {
                    const list = [];
                    const newMatchIds = new Set();
                    snap.forEach(doc => {
                        const d = doc.data();
                        const otherId = (d.participants || []).find(p => p !== uid);
                        const teamData = teamListRef.current.find(t => t.id === otherId) || d.team || { name: "Rakip", logo: "⚽" };
                        const myVote = d[`result_${uid}`] || null;
                        const opVote = otherId ? (d[`result_${otherId}`] || null) : null;
                        let result = d.result || null;
                        let resultConfirmed = d.resultConfirmed || false;
                        // Her kullanıcı yalnızca kendi bayrağını kontrol eder
                        // (Firestore rules: takım belgesi yalnızca sahibi tarafından güncellenebilir)
                        const myPtsAwarded = !!d[`ptsAwarded_${uid}`] || !!d.pointsAwarded;
                        const disputed = !!d.disputed;
                        const adminResolved = !!d.adminResolved;
                        const ptsFor = (v) => v === "win" ? 100 : v === "draw" ? 50 : 25;
                        const statsFor = (v) => v === "win" ? { wins: FV.increment(1) } : v === "draw" ? { draws: FV.increment(1) } : { losses: FV.increment(1) };

                        function applyResult(matchId, myVote, extraMatchFields, afterFn) {
                            const matchRef = db.collection("matches").doc(matchId);
                            const myTeamRef = db.collection("teams").doc(uid);
                            db.runTransaction(async (tx) => {
                                const mSnap = await tx.get(matchRef);
                                const cur = mSnap.data() || {};
                                if (cur[`ptsAwarded_${uid}`] || cur.pointsAwarded) return null;
                                const mv = myVote;
                                const myPts = ptsFor(mv);
                                tx.update(myTeamRef, { points: FV.increment(myPts), played: FV.increment(1), ...statsFor(mv) });
                                // chatDeleted transaction içinde atomik olarak set ediliyor
                                tx.update(matchRef, { result: mv, resultConfirmed: true, [`ptsAwarded_${uid}`]: true, chatDeleted: true, ...extraMatchFields });
                                return { myVote: mv, myPts };
                            }).then(res => {
                                if (!res) return;
                                const { myVote: v, myPts: p } = res;
                                setMe(m => ({ ...m, wins: (m.wins || 0) + (v === "win" ? 1 : 0), draws: (m.draws || 0) + (v === "draw" ? 1 : 0), losses: (m.losses || 0) + (v === "loss" ? 1 : 0), played: (m.played || 0) + 1, points: (m.points || 0) + p }));
                                setFloatPts(p); setTimeout(() => setFloatPts(null), 1500);
                                afterFn && afterFn(v, p);
                                // Mesajları sil + swipe sıfırla
                                db.collection("matches").doc(matchId).collection("messages").get()
                                    .then(msgs => { const b = db.batch(); msgs.forEach(m2 => b.delete(m2.ref)); b.commit().catch(() => {}); }).catch(() => {});
                                if (otherId) {
                                    db.collection("swipes").doc(uid).collection("records").doc(otherId).delete().catch(() => {});
                                    db.collection("swipes").doc(otherId).collection("records").doc(uid).delete().catch(() => {});
                                }
                            }).catch(err => console.error("[applyResult] Transaction hatası:", err));
                        }

                        // Admin kararı var ve henüz puan verilmemişse uygula
                        const adminResult = d.adminResult || null;
                        if (adminResult && !myPtsAwarded) {
                            const myAdminVote = adminResult[uid];
                            if (myAdminVote) {
                                applyResult(doc.id, myAdminVote, { adminResolved: true }, (v, p) => {
                                    toast(`⚖️ Hakem kararı uygulandı! +${p} puan`, "success");
                                    db.collection("disputes").doc(doc.id).set({ status: "resolved", resolvedAt: FV.serverTimestamp() }, { merge: true }).catch(() => {});
                                });
                                result = myAdminVote; resultConfirmed = true;
                            }
                        }

                        if (myVote && opVote && !myPtsAwarded && !adminResult) {
                            const agree = (myVote === "win" && opVote === "loss") ||
                                (myVote === "loss" && opVote === "win") ||
                                (myVote === "draw" && opVote === "draw");
                            if (agree) {
                                applyResult(doc.id, myVote, {}, (v, p) => {
                                    toast(`Sonuç onaylandı! +${p} puan`, "success");
                                });
                                result = myVote; resultConfirmed = true;
                            } else if (!d.disputeRecorded) {
                                // Oylar çakışıyor → itiraz kaydet
                                db.collection("disputes").doc(doc.id).set({
                                    matchId: doc.id,
                                    participants: d.participants || [uid, otherId],
                                    team1: { id: uid, name: teamListRef.current.find(t => t.id === uid)?.name || "Taraf 1", vote: myVote },
                                    team2: { id: otherId || "", name: teamData.name || "Taraf 2", vote: opVote },
                                    scheduledTime: d.scheduledTime || null,
                                    status: "pending",
                                    createdAt: FV.serverTimestamp()
                                }, { merge: true }).catch(() => {});
                                db.collection("matches").doc(doc.id).update({ disputed: true, disputeRecorded: true }).catch(() => {});
                            }
                        }
                        newMatchIds.add(doc.id);
                        if (!d.chatDeleted) {
                            list.push({ ...d, id: doc.id, chatId: doc.id, team: teamData, result, resultConfirmed, disputed, adminResolved });
                        }
                    });
                    // Sırala: en yeni eşleşme önce
                    list.sort((a, b) => {
                        const tA = a.createdAt?.toDate?.() || new Date(a.createdAt || 0);
                        const tB = b.createdAt?.toDate?.() || new Date(b.createdAt || 0);
                        return tB - tA;
                    });
                    // İlk taraf için popup göster: yeni gelen match var mı kontrol et
                    setMatches(prev => {
                        const prevIds = new Set(prev.map(m => m.id));
                        list.forEach(m => {
                            if (!prevIds.has(m.id)) {
                                // İlk yüklemede popup gösterme (her girişte tekrar açılmasın)
                                if (initialMatchesLoadedRef.current) {
                                    setPopup(p => p ? p : { ...m.team, _matchId: m.id });
                                }
                            }
                        });
                        initialMatchesLoadedRef.current = true;
                        return list;
                    });
                }, (err) => { console.error('matches listener error:', err); });
                return () => unsub();
            }, [uid]);

            // Tüm eşleşmelerin mesajlarını real-time dinle (son mesaj + anlık iletim)
            const chatUnsubsRef = React.useRef({});
            const uidRef = React.useRef(uid);
            React.useEffect(() => { uidRef.current = uid; }, [uid]);

            React.useEffect(() => {
                if (!uid) return;

                // Yeni match'ler için listener ekle
                matches.forEach(m => {
                    if (chatUnsubsRef.current[m.chatId]) return; // zaten dinleniyor
                    const chatId = m.chatId;
                    const unsub = db.collection("matches").doc(chatId).collection("messages")
                        .orderBy("ts", "asc").onSnapshot(snap => {
                            const currentUid = uidRef.current;
                            const msgs = [];
                            snap.forEach(doc => {
                                const d = doc.data();
                                const from = d.senderId === "system" ? "system"
                                    : d.senderId ? (d.senderId === currentUid ? "me" : "them")
                                        : (d.from || "them");
                                let myVote = null, opVote = null, confirmed = false;
                                if (d.type === "result_request") {
                                    myVote = d.votes?.[currentUid] || null;
                                    const opEntry = Object.entries(d.votes || {}).find(([k]) => k !== currentUid);
                                    opVote = opEntry ? opEntry[1] : null;
                                    confirmed = !!(myVote && opVote);
                                }
                                msgs.push({ ...d, id: doc.id, ts: d.ts?.toDate?.() || new Date(), from, myVote, opVote, confirmed });
                            });
                            setChats(prev => ({ ...prev, [chatId]: msgs }));
                        }, () => { });
                    chatUnsubsRef.current[chatId] = unsub;
                });

                // Artık olmayan match'lerin listener'larını kapat
                const activeIds = new Set(matches.map(m => m.chatId));
                Object.keys(chatUnsubsRef.current).forEach(id => {
                    if (!activeIds.has(id)) {
                        chatUnsubsRef.current[id]();
                        delete chatUnsubsRef.current[id];
                    }
                });
            }, [uid, matches.map(m => m.chatId).join(',')]);

            React.useEffect(() => {
                const iv = setInterval(() => {
                    const now = Date.now();
                    setMatches(ms => ms.map(m => {
                        if (m.confirmed && m.scheduledTime && !m.resultAsked && !m.result) {
                            if (now >= new Date(m.scheduledTime).getTime() + 60000) {
                                if (uid) db.collection("matches").doc(m.id).update({ resultAsked: true }).catch(() => { });
                                return { ...m, resultAsked: true };
                            }
                        }
                        return m;
                    }));
                }, 5000);
                return () => clearInterval(iv);
            }, []);

            React.useEffect(() => {
                matches.forEach(m => {
                    if (m.resultAsked && !m.result && !injectedRef.current.has(m.id)) {
                        injectedRef.current.add(m.id);
                        // Her iki kullanıcının görmesi için Firestore'a yaz (sabit ID ile)
                        if (uid) {
                            const msgRef = db.collection("matches").doc(m.id)
                                .collection("messages").doc("result_req_" + m.id);
                            msgRef.get().then(snap => {
                                if (!snap.exists) {
                                    msgRef.set({
                                        type: "result_request",
                                        matchId: m.id,
                                        votes: {},
                                        senderId: "system",
                                        ts: FV.serverTimestamp()
                                    }).catch(() => { });
                                }
                            }).catch(() => { });
                        }
                    }
                });
            }, [matches]);

            function toast(msg, type = "info") { setToastMsg({ msg, type }); setTimeout(() => setToastMsg(null), 3000); }

            function addPts(n) {
                setMe(m => ({ ...m, points: (m.points || 0) + n }));
                setFloatPts(n);
                setTimeout(() => setFloatPts(null), 1500);
                if (uid) db.collection("teams").doc(uid).update({ points: FV.increment(n) }).catch(() => { });
            }

            function toggleDay(d) {
                setMe(m => {
                    const a = m.avail || [];
                    const newAvail = a.includes(d) ? a.filter(x => x !== d) : [...a, d];
                    if (uid) db.collection("teams").doc(uid).update({ avail: newAvail }).catch(() => { });
                    return { ...m, avail: newAvail };
                });
            }

            function updateMe(f) {
                setMe(m => ({ ...m, ...f }));
                if (uid) db.collection("teams").doc(uid).update(f).catch(() => { });
            }

            function saveTeamToFirestore(profile) {
                const data = { ...profile, wins: 0, losses: 0, draws: 0, points: 0, played: 0, rating: 0, isPremium: false };
                setMe({ ...data, id: uid || "local" });
                setScreen("home");
                if (uid) {
                    db.collection("teams").doc(uid).set({ ...data, id: uid, createdAt: FV.serverTimestamp() }).catch(e => console.error(e));
                }
            }

            const HIDE_LEFT_MS = 10 * 60 * 1000;
            const sameCityTeams = me ? teamList.filter(t => t.city === me.city) : [];
            const unswiped = sameCityTeams.filter(t => {
                const id = String(t.id);
                if (localSwiped.has(id)) return false; // anında yerel filtre (ghost card önle)
                const rec = swipeMap.get(id);
                if (!rec) return true;
                if (rec.direction === "right" || rec.direction === "super") return false;
                if (rec.direction === "left") return (nowTick - rec.tsMs) > HIDE_LEFT_MS;
                return true;
            });
            const top = unswiped[0];
            const myInitiated = matches.filter(m => m.incoming === false).length;

            function doSwipe(dir) {
                if (!top || !uid) return;
                const like = dir === "right" || dir === "super";
                if (!me?.isPremium) {
                    if (dir === "super") { setShowPrem(true); return; }
                    if (swipeMap.size >= 5 || matches.length >= 1 || (me?.played || 0) >= 1) { setShowPrem(true); return; }
                }
                setSwipeDir(dir === "super" ? "right" : dir);
                const topId = String(top.id);
                setLocalSwiped(prev => new Set([...prev, topId])); // anında gizle

                // 1) Kendi swipe'ımızı kaydet (fire-and-forget)
                db.collection("swipes").doc(uid).collection("records").doc(topId)
                    .set({ direction: dir, ts: FV.serverTimestamp() })
                    .catch(() => { });

                setTimeout(() => {
                    setSwipeDir(null);
                    if (!like) return;

                    const matchId = [uid, topId].sort().join("_");

                    // 2) Karşı tarafın swipe'ını kontrol et — sadece karşılıklı beğenide eşleş
                    db.collection("swipes").doc(topId).collection("records").doc(uid)
                        .get()
                        .then(snap => {
                            if (snap.exists) {
                                const theirDir = snap.data().direction;
                                if (theirDir === "right" || theirDir === "super") {
                                    // ✅ Karşılıklı beğeni — match oluştur
                                    const matchData = {
                                        participants: [uid, topId],
                                        team: { name: top.name, logo: top.logo, city: top.city, district: top.district, level: top.level, players: top.players, wins: top.wins, losses: top.losses, draws: top.draws, points: top.points, rating: top.rating },
                                        confirmed: false, result: null, scheduledTime: null,
                                        resultAsked: false, resultConfirmed: false,
                                        superLike: dir === "super" || theirDir === "super",
                                        createdAt: FV.serverTimestamp()
                                    };
                                    db.collection("matches").doc(matchId)
                                        .set(matchData, { merge: true })
                                        .catch(() => { });
                                    setMatches(ms => [
                                        ...ms.filter(m => m.id !== matchId),
                                        { ...matchData, id: matchId, chatId: matchId, team: top, createdAt: new Date() }
                                    ]);
                                    setPopup({ ...top, _matchId: matchId });
                                    addPts(dir === "super" ? 60 : 35);
                                } else {
                                    // Karşı taraf beğenmemiş
                                    toast("Beğenin kaydedildi, eşleşme bekleniyor...");
                                }
                            } else {
                                // Karşı taraf henüz swipe yapmamış
                                toast("Beğenin kaydedildi, eşleşme bekleniyor...");
                            }
                        })
                        .catch(() => {
                            toast("Beğenin kaydedildi!");
                        });
                }, 400);
            }

            function sendMsg(chatId, text, type, payload) {
                // Sadece onaylanmış eşleşme varsa mesaj gönderilebilir
                const match = matches.find(m => m.chatId === chatId);
                if (!match || !uid) return;
                // Firestore'a yaz; onSnapshot zaten gerçek zamanlı güncelleyecek
                // Optimistic eklemiyoruz — çift mesaj görünmesini önler
                const msg = { senderId: uid, text, type: type || "text", payload: payload || null, ts: FV.serverTimestamp() };
                db.collection("matches").doc(chatId).collection("messages").add(msg).catch(() => { });
            }

            function acceptInvite(chatId, msgId, payload) {
                // Lokal güncelle
                setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(m => m.id === msgId ? { ...m, payload: { ...m.payload, accepted: true, rejected: false } } : m) }));
                // Firestore mesajını güncelle (karşı taraf görsün)
                if (uid) {
                    db.collection("matches").doc(chatId).collection("messages").doc(msgId)
                        .update({ "payload.accepted": true, "payload.rejected": false })
                        .catch(() => { });
                }
                const idx = matches.findIndex(m => m.chatId === chatId);
                if (idx >= 0) {
                    const upd = { confirmed: true, scheduledTime: payload.datetime };
                    setMatches(ms => ms.map((m, i) => i === idx ? { ...m, ...upd } : m));
                    if (uid) db.collection("matches").doc(chatId).update(upd).catch(() => { });
                    addPts(25); toast("Maç onaylandı! +25 puan", "success");
                }
            }

            function rejectInvite(chatId, msgId) {
                // Sadece lokal state'i güncelle – karşı taraf kendi kanalından okur
                setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(m => m.id === msgId ? { ...m, payload: { ...m.payload, rejected: true, accepted: false } } : m) }));
                if (uid) db.collection("matches").doc(chatId).collection("messages")
                    .doc(msgId).update({ "payload.rejected": true, "payload.accepted": false }).catch(() => { });
            }

            function voteResult(chatId, msgId, matchId, vote) {
                // Oyu result_request mesajının votes alanına yaz
                if (uid) {
                    db.collection("matches").doc(chatId).collection("messages").doc(msgId)
                        .update({ [`votes.${uid}`]: vote })
                        .catch(() => {
                            // Belge set ile deneme (ID uyuşmazlığı olabilir)
                            db.collection("matches").doc(chatId).collection("messages").doc(msgId)
                                .set({ [`votes.${uid}`]: vote }, { merge: true }).catch(() => { });
                        });
                    // Match belgesine de yaz (listener sonucu hesaplasın)
                    db.collection("matches").doc(matchId)
                        .update({ [`result_${uid}`]: vote })
                        .catch(() => { });
                }
                // Lokal state'de kendi oyumuzu hemen göster
                setChats(c => ({ ...c, [chatId]: (c[chatId] || []).map(msg => msg.id === msgId ? { ...msg, myVote: vote } : msg) }));
                toast("Oyun gönderildi — rakip onayı bekleniyor…", "info");
            }

            if (screen === "splash") return <Splash />;
            if (screen === "auth") return <LoginScreen onSuccess={() => { const u = auth.currentUser; if (u) navigateAfterAuth(u.uid); }} />;
            if (screen === "onboard" || !me) return <Onboarding th={th} onComplete={saveTeamToFirestore} />;

            const rnk = getRank(me.points || 0);
            const nextRnk = RANKS.find(l => l.min > (me.points || 0));
            const prog = nextRnk ? Math.min(100, (((me.points || 0) - rnk.min) / (nextRnk.min - rnk.min)) * 100) : 100;
            const pendingBadge = matches.filter(m => !m.confirmed).length;
            const allBoard = [...teamList, { ...me, id: uid || "local" }].sort((a, b) => (b.points || 0) - (a.points || 0));
            const myRankGlobal = allBoard.findIndex(t => t.id === (uid || "local")) + 1;
            const tourneyQualified = myRankGlobal >= 1 && myRankGlobal <= 8;

            return (
                <div style={{ width: "100%", maxWidth: 430, height: "100dvh", margin: "0 auto", display: "flex", flexDirection: "column", overflow: "hidden", position: "relative", background: th.bg, color: th.text }}>
                    {toastMsg && <Toast msg={toastMsg.msg} type={toastMsg.type} th={th} />}
                    {floatPts && <div style={{ position: "fixed", top: "36%", left: "50%", zIndex: 400, fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 44, color: th.acc, pointerEvents: "none", animation: "floatUp 1.2s ease forwards", letterSpacing: 2 }}>+{floatPts}</div>}
                    {popup && <MatchPopup team={popup} me={me} th={th} onChat={() => { const matchId = popup._matchId || [uid, String(popup.id)].sort().join("_"); setPopup(null); setActiveChat(matchId); setTab("discover"); }} onClose={() => setPopup(null)} />}
                    {showPrem && <PremiumModal th={th} onActivate={() => { setMe(m => ({ ...m, isPremium: true })); setShowPrem(false); toast("Premium aktif!", "success"); }} onClose={() => setShowPrem(false)} />}
                    <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", minHeight: 0 }}>
                        {tab === "home" && <HomeTab me={me} uid={uid} rnk={rnk} prog={prog} nextRnk={nextRnk} matches={matches} setTab={setTab} setActiveChat={setActiveChat} setShowPrem={setShowPrem} toggleDay={toggleDay} th={th} dark={dark} tourneyRank={myRankGlobal} tourneyQualified={tourneyQualified} allBoard={allBoard} />}
                        {tab === "discover" && (activeChat != null && matches.some(m => m.chatId === activeChat)
                            ? <ChatScreen chatId={activeChat} matches={matches} chats={chats} sendMsg={sendMsg} acceptInvite={acceptInvite} rejectInvite={rejectInvite} voteResult={voteResult} onBack={() => setActiveChat(null)} onBlock={onBlock} th={th} dark={dark} uid={uid} />
                            : <DiscoverTab me={me} top={top} unswiped={unswiped} swipeDir={swipeDir} doSwipe={doSwipe} rnk={rnk} prog={prog} matches={matches} setActiveChat={id => { if (matches.some(m => m.chatId === id)) setActiveChat(id); }} th={th} dark={dark} />
                        )}
                        {tab === "matches" && (activeChat != null && matches.some(m => m.chatId === activeChat)
                            ? <ChatScreen chatId={activeChat} matches={matches} chats={chats} sendMsg={sendMsg} acceptInvite={acceptInvite} rejectInvite={rejectInvite} voteResult={voteResult} onBack={() => setActiveChat(null)} onBlock={onBlock} th={th} dark={dark} uid={uid} />
                            : <MatchesTab matches={matches} chats={chats} isPremium={!!me?.isPremium} onChat={id => {
                                    if (!me?.isPremium && matches.length > 1) {
                                        const sorted = [...matches].sort((a, b) => {
                                            const tA = a.createdAt?.toDate?.() || new Date(a.createdAt || 0);
                                            const tB = b.createdAt?.toDate?.() || new Date(b.createdAt || 0);
                                            return tA - tB;
                                        });
                                        if (id !== sorted[0]?.id) { setShowPrem(true); return; }
                                    }
                                    setActiveChat(id);
                                }} th={th} dark={dark} />
                        )}
                        {tab === "leaderboard" && <LeaderTab me={me} all={allBoard} th={th} dark={dark} />}
                        {tab === "profile" && <ProfileTab me={me} rnk={rnk} prog={prog} nextRnk={nextRnk} setShowPrem={setShowPrem} updateMe={updateMe} toggleDay={toggleDay} th={th} dark={dark} setDark={setDark} />}
                    </div>
                    <BotNav tab={tab} setTab={t => { if (t !== "discover" && t !== "matches") setActiveChat(null); setTab(t); }} badge={pendingBadge} th={th} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('[SW] Kayıtlı:', reg.scope))
                    .catch(err => console.warn('[SW] Hata:', err));
            });
        }
    </script>
</body>

</html>
