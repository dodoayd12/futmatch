        function IStyle(th) { return { width: "100%", padding: "14px 16px", borderRadius: 12, border: `1px solid ${th ? th.border2 : "#252525"}`, background: th ? th.inp : "#0d0d0d", color: th ? th.text : "#fff", fontSize: 14, outline: "none", fontFamily: "'Outfit',sans-serif" }; }

        // ── KÜFÜR FİLTRESİ ───────────────────────────────────────────────────
        function hasProfanity(input) {
            if (!input) return false;
            const norm = s => s.toLowerCase()
                .replace(/[ıİ]/g, 'i').replace(/[şŞ]/g, 's').replace(/[çÇ]/g, 'c')
                .replace(/[ğĞ]/g, 'g').replace(/[üÜ]/g, 'u').replace(/[öÖ]/g, 'o')
                .replace(/[@4]/g, 'a').replace(/[3]/g, 'e').replace(/[0]/g, 'o')
                .replace(/[1!|]/g, 'i').replace(/[$5]/g, 's').replace(/[2]/g, 'z')
                .replace(/[7]/g, 't').replace(/[8]/g, 'b').replace(/[6]/g, 'g');
            const full = norm(input).replace(/[^a-z]/g, '');
            const words = norm(input).split(/[^a-z]+/).filter(w => w.length > 0);
            // Substring: uzun/orta küfürler bitişik yazılarak gizlenebilir
            const subList = [
                'sik','orospu','ibne','kaltak','gavat','surtuk','kahpe',
                'amina','amk','amq','sikim','sikis','sikici','anneni','ananin',
                'anasini','amcik','pic','bok','orospu','picligi','gotlek',
                'fuck','shit','bitch','cock','dick','cunt','pussy','asshole',
                'bastard','whore','nigga','retard'
            ];
            // Tam kelime: meşru isimlerde alt dizi olarak görünebilecek kısa kelimeler
            const exactList = ['am','oc','got','sex'];
            if (subList.some(w => full.includes(w))) return true;
            if (exactList.some(w => words.includes(w))) return true;
            return false;
        }

                            <div style={{ color: th.text3, fontSize: 13, lineHeight: 1.6 }}>Sınırsız swipe, öncelikli eşleşme ve daha fazlası</div>
                        </div>
                        {[["♾️", "Sınırsız Swipe", "Günlük limit yok"], ["⚡", "Süper Beğeni", "Her gün 5 süper beğeni"], ["📊", "Detaylı İstatistik", "Gelişmiş analiz paneli"], ["🏆", "Turnuva Önceliği", "Erken kayıt hakkı"]].map(([ic, t, s]) => (
                            <div key={t} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${th.border}` }}>
                                <span style={{ fontSize: 22, width: 32, textAlign: "center" }}>{ic}</span>
                                <div><div style={{ color: th.text, fontSize: 13, fontWeight: 700 }}>{t}</div><div style={{ color: th.text4, fontSize: 11 }}>{s}</div></div>
                            </div>
                        ))}
                        <div style={{ marginTop: 20, display: "flex", gap: 10 }}>
                            <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 14, border: `1px solid ${th.border3}`, background: "transparent", color: th.text3, fontSize: 13, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>İptal</button>
                            <button onClick={onActivate} style={{ flex: 2, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg,#F5F234,#FFD700)", color: "#000", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>⚡ ₺99/ay Başla</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ── SWIPE CARD ────────────────────────────────────────────────────────
        function SwipeCard({ team, dir, th, dark, dragX, isDragging }) {
            const rnk = getRank(team.points);
            const anim = dir === "left" ? "swipeLeft .4s ease forwards" : dir === "right" ? "swipeRight .4s ease forwards" : "none";
            const rotate = isDragging ? dragX * 0.08 : 0;
            const likeOpacity = isDragging && dragX > 0 ? Math.min(1, dragX / 60) : 0;
            const nopeOpacity = isDragging && dragX < 0 ? Math.min(1, -dragX / 60) : 0;
            const dragStyle = isDragging
                ? { transform: `translateX(${dragX}px) rotate(${rotate}deg)`, transition: "none" }
                : {};
            return (
                <div style={{ position: "absolute", width: "100%", height: "100%", borderRadius: 24, overflow: "hidden", background: th.card, border: `1px solid ${th.border}`, animation: anim, boxShadow: dark ? "0 20px 60px rgba(0,0,0,.8)" : "0 20px 60px rgba(0,0,0,.15)", ...dragStyle }}>
                    {/* LIKE overlay */}
                    <div style={{ position: "absolute", inset: 0, zIndex: 10, borderRadius: 24, background: "rgba(74,222,128,0.22)", border: "3px solid #4ade80", opacity: likeOpacity, pointerEvents: "none", transition: "opacity .05s" }} />
                    {/* NOPE overlay */}
                    <div style={{ position: "absolute", inset: 0, zIndex: 10, borderRadius: 24, background: "rgba(248,113,113,0.22)", border: "3px solid #f87171", opacity: nopeOpacity, pointerEvents: "none", transition: "opacity .05s" }} />
                    <div style={{ height: "55%", background: dark ? `linear-gradient(160deg,#111,#0a0a00)` : `linear-gradient(160deg,#f8f7ee,#fff)`, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden" }}>
                        <div style={{ position: "absolute", inset: 0, backgroundImage: `radial-gradient(circle at 50% 40%, ${th.acc}15 0%, transparent 65%)`, pointerEvents: "none" }} />
                        <div style={{ textAlign: "center", position: "relative", zIndex: 1 }}>
                            <div style={{ fontSize: 80, marginBottom: 10, animation: "heartbeat 2s ease infinite" }}>{team.logo}</div>
                            <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 30, color: th.text, letterSpacing: 2, lineHeight: 1 }}>{team.name}</div>
                            <div style={{ color: th.text4, fontSize: 13, marginTop: 4 }}>📍 {team.city} · {team.district}</div>
                        </div>
                    </div>
                    <div style={{ padding: "16px 18px" }}>
                        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                            {[team.level, `${team.players} Oyuncu`, `${rnk.icon} ${rnk.label}`].map(t => (
                                <span key={t} style={{ padding: "4px 12px", borderRadius: 20, background: th.bg4, border: `1px solid ${th.border}`, color: th.text3, fontSize: 11, fontWeight: 600 }}>{t}</span>
                            ))}
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                            {[["G", team.wins, "#4ade80"], ["B", team.draws, th.text3], ["M", team.losses, "#f87171"]].map(([l, v, c]) => (
                                <div key={l} style={{ textAlign: "center", background: th.bg4, borderRadius: 12, padding: "10px 6px" }}>
                                    <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 22, color: c }}>{v}</div>
                                    <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1 }}>{l}</div>
                                </div>
                            ))}
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            {(team.avail || []).map(d => <span key={d} style={{ padding: "3px 9px", borderRadius: 20, background: `${th.acc}15`, border: `1px solid ${th.acc}44`, color: th.acc, fontSize: 10, fontWeight: 700 }}>{d}</span>)}
                        </div>
                        {team.desc && <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.6, marginTop: 10, fontStyle: "italic" }}>"{team.desc}"</div>}
                    </div>
                </div>
            );
        }

        // ── DISCOVER TAB ──────────────────────────────────────────────────────
        function DiscoverTab({ me, top, unswiped, swipeDir, doSwipe, rnk, prog, matches, setActiveChat, th, dark }) {
            const [dragX, setDragX] = React.useState(0);
            const [isDragging, setIsDragging] = React.useState(false);
            const startXRef = React.useRef(null);
            const THRESHOLD = 80;

            function onStart(cx) { startXRef.current = cx; setIsDragging(true); }
            function onMove(cx) { if (startXRef.current !== null) setDragX(cx - startXRef.current); }
            function onEnd() {
                if (startXRef.current === null) return;
                const dx = dragX;
                startXRef.current = null;
                setIsDragging(false);
                setDragX(0);
                if (dx > THRESHOLD) doSwipe("right");
                else if (dx < -THRESHOLD) doSwipe("left");
            }

            if (!top && unswiped.length === 0) {
                return (
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: th.bg, padding: 24 }}>
                        <div style={{ fontSize: 52, marginBottom: 16 }}>⏳</div>
                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 28, color: th.text, letterSpacing: 1.5, marginBottom: 8, textAlign: "center" }}>BÖLGENDE UYGUN TAKM KALMADI</div>
                        <div style={{ color: th.text4, fontSize: 13, textAlign: "center", lineHeight: 1.7 }}>
                            Bölgenizdeki takımlar yenilenene kadar eşleşme bekleyin.
                        </div>
                    </div>
                );
            }

            const chatMatches = matches.filter(m => m.chatId);
            return (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", background: th.bg, overflow: "hidden" }}>
                    {/* Header */}
                    <div style={{ padding: "14px 16px 10px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${th.border}`, flexShrink: 0 }}>
                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 22, color: th.text, letterSpacing: 2 }}>KEŞFET</div>
                        <span style={{ padding: "3px 8px", borderRadius: 8, background: `${th.acc}20`, border: `1px solid ${th.acc}44`, color: th.acc, fontSize: 10, fontWeight: 700 }}>{rnk.icon} {rnk.label}</span>
                    </div>

                    {/* Drag-to-swipe card area */}
                    <div
                        style={{ flex: 1, position: "relative", overflow: "hidden", padding: "12px 16px", cursor: isDragging ? "grabbing" : "grab", userSelect: "none", touchAction: "none" }}
                        onTouchStart={e => onStart(e.touches[0].clientX)}
                        onTouchMove={e => { e.preventDefault(); onMove(e.touches[0].clientX); }}
                        onTouchEnd={onEnd}
                        onMouseDown={e => onStart(e.clientX)}
                        onMouseMove={e => { if (startXRef.current !== null) onMove(e.clientX); }}
                        onMouseUp={onEnd}
                        onMouseLeave={onEnd}
                    >
                        <div style={{ position: "relative", width: "100%", height: "100%" }}>
                            {unswiped.slice(0, 3).reverse().map((t, i, arr) => {
                                const isTop = i === arr.length - 1;
                                const scale = 1 - ((arr.length - 1 - i) * 0.03);
                                const translateY = (arr.length - 1 - i) * 8;
                                return (
                                    <div key={t.id} style={{ position: "absolute", inset: 0, transform: isTop ? "none" : `scale(${scale}) translateY(-${translateY}px)`, transformOrigin: "bottom center", transition: "transform .3s ease" }}>
                                        {isTop
                                            ? <SwipeCard team={t} dir={swipeDir} th={th} dark={dark} dragX={dragX} isDragging={isDragging} />
                                            : <SwipeCard team={t} dir={null} th={th} dark={dark} dragX={0} isDragging={false} />}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Action buttons */}
                    <div style={{ flexShrink: 0, padding: "0 20px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 10 }}>
                            <button onClick={() => doSwipe("left")} style={{ width: 58, height: 58, borderRadius: 29, border: `2px solid #f87171`, background: "rgba(248,113,113,0.08)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                            <button onClick={() => doSwipe("super")} style={{ width: 52, height: 52, borderRadius: 26, border: `2px solid #F5F234`, background: "transparent", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>⭐</button>
                            <button onClick={() => doSwipe("right")} style={{ width: 58, height: 58, borderRadius: 29, border: `2px solid #4ade80`, background: "rgba(74,222,128,0.08)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                        </div>
                        <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
                            <span style={{ color: th.text5, fontSize: 10 }}>← Sola: Geç</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>·</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>⭐ Süper</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>·</span>
                            <span style={{ color: th.text5, fontSize: 10 }}>Sağa: Beğen →</span>
                        </div>
                    </div>

                    {/* Active chats */}
                    {chatMatches.length > 0 && (
                        <div style={{ flexShrink: 0, borderTop: `1px solid ${th.border}`, padding: "10px 16px 10px" }}>
                            <div style={{ color: th.text4, fontSize: 10, letterSpacing: 2, fontWeight: 700, marginBottom: 8 }}>SOHBETLER</div>
                            <div style={{ display: "flex", gap: 10, overflowX: "auto" }}>
                                {chatMatches.map(m => (
                                    <button key={m.id} onClick={() => setActiveChat(m.chatId)} style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, background: "none", border: "none", cursor: "pointer" }}>
                                        <div style={{ width: 44, height: 44, borderRadius: 14, background: th.bg4, border: `2px solid ${m.confirmed ? "#4ade80" : th.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{m.team.logo}</div>
                                        <span style={{ color: th.text4, fontSize: 9, maxWidth: 44, textAlign: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.team.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }


        // ── CHAT SCREEN ───────────────────────────────────────────────────────
        function ChatScreen({ chatId, matches, chats, sendMsg, acceptInvite, rejectInvite, voteResult, onBack, onBlock, th, dark, uid }) {
            const [text, setText] = React.useState("");
            const [showInvite, setShowInvite] = React.useState(false);
            const [selDay, setSelDay] = React.useState(null);
            const [selTime, setSelTime] = React.useState("15:00");
            const [showMenu, setShowMenu] = React.useState(false);
            const [showReport, setShowReport] = React.useState(false);
            const [showBlockConfirm, setShowBlockConfirm] = React.useState(false);
            const [reportReason, setReportReason] = React.useState("");
            const [reportDone, setReportDone] = React.useState(false);
            const match = matches.find(m => m.chatId === chatId);
            const msgs = chats[chatId] || [];
            const endRef = React.useRef(null);
            React.useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

            // Generate next 7 days
            const days = React.useMemo(() => {
                const arr = [];
                const now = new Date();
                const dayNames = ["Paz", "Pzt", "Sal", "Çar", "Per", "Cum", "Cmt"];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(now); d.setDate(now.getDate() + i);
                    arr.push({ label: (i === 0 ? "Bugün" : i === 1 ? "Yarın" : dayNames[d.getDay()]), date: d, iso: d.toISOString().split("T")[0] });
                }
                return arr;
            }, []);

            const times = Array.from({ length: 18 }, (_, i) => `${String(i + 6).padStart(2, "0")}:00`);

            function send() { if (!text.trim()) return; sendMsg(chatId, text.trim()); setText(""); }

            function isPastSlot(isoDate, time) {
                const dt = new Date(`${isoDate}T${time}`);
                return dt <= new Date();
            }

            function sendInvite() {
                if (!selDay) return;
                if (isPastSlot(selDay.iso, selTime)) return;
                const dt = new Date(`${selDay.iso}T${selTime}`);
                const fmt = dt.toLocaleString("tr-TR", { weekday: "long", day: "numeric", month: "long", hour: "2-digit", minute: "2-digit" });
                sendMsg(chatId, `📅 Maç Daveti: ${fmt}`, "match_invite", { datetime: dt.toISOString(), accepted: false, rejected: false });
                setShowInvite(false); setSelDay(null); setSelTime("15:00");
            }

            const team = match?.team;
            const otherId = (match?.participants || []).find(p => p !== uid) || null;

            function deleteMessages() {
                db.collection("matches").doc(chatId).collection("messages").get()
                    .then(snap => {
                        const b = db.batch();
                        snap.forEach(d => b.delete(d.ref));
                        b.commit().catch(() => {});
                    }).catch(() => {});
            }

            function doBlock() {
                if (!otherId) return;
                onBlock && onBlock(otherId);
                deleteMessages();
                // Sohbeti listeden kaldır
                db.collection("matches").doc(chatId).update({ chatDeleted: true }).catch(() => {});
                setShowBlockConfirm(false);
                setShowMenu(false);
                onBack();
            }

            function doReport() {
                if (!otherId || !reportReason) return;
                const allMsgs = chats[chatId] || [];
                const last10 = allMsgs.slice(-10).map(m => ({
                    from: m.from === "me" ? "reporter" : "reported",
                    text: m.text || `[${m.type}]`,
                    ts: m.ts instanceof Date ? m.ts.toISOString() : (m.ts || "")
                }));
                db.collection("reports").add({
                    reporterId: uid,
                    reportedId: otherId,
                    reportedTeam: team?.name || "?",
                    matchId: chatId,
                    reason: reportReason,
                    last10Messages: last10,
                    createdAt: FV.serverTimestamp()
                }).catch(err => console.error("Report hatası:", err));
                onBlock && onBlock(otherId);
                deleteMessages();
                db.collection("matches").doc(chatId).update({ chatDeleted: true }).catch(() => {});
                setReportDone(true);
                setTimeout(() => { setShowReport(false); setReportReason(""); setReportDone(false); onBack(); }, 2000);
            }

            return (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", background: th.bg, height: "100%", position: "relative" }} onClick={() => showMenu && setShowMenu(false)}>
                    {/* Header */}
                    <div style={{ padding: "12px 16px", borderBottom: `1px solid ${th.border}`, display: "flex", alignItems: "center", gap: 12, flexShrink: 0, background: th.nav }}>
                        <button onClick={onBack} style={{ background: "none", border: "none", color: th.acc, fontSize: 22, cursor: "pointer", padding: 0, lineHeight: 1 }}>←</button>
                        {team && <><div style={{ fontSize: 26 }}>{team.logo}</div>
                            <div style={{ flex: 1 }}>
                                <div style={{ color: th.text, fontWeight: 800, fontSize: 15 }}>{team.name}</div>
                                <div style={{ color: match?.confirmed ? "#4ade80" : "#f97316", fontSize: 11, fontWeight: 600 }}>{match?.confirmed ? "✅ Maç Onaylandı" : "⏳ Onay Bekleniyor"}</div>
                            </div></>}
                        <button onClick={() => setShowMenu(v => !v)} style={{ background: "none", border: "none", color: th.text3, fontSize: 22, cursor: "pointer", padding: "0 2px", lineHeight: 1, flexShrink: 0 }}>⋯</button>
                    </div>
                    {/* Dropdown menu */}
                    {showMenu && (
                        <div style={{ position: "absolute", top: 56, right: 12, zIndex: 200, background: th.card, border: `1px solid ${th.border2}`, borderRadius: 14, overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,.35)", minWidth: 190 }}>
                            <button onClick={() => { setShowMenu(false); setShowReport(true); }} style={{ width: "100%", padding: "13px 18px", background: "none", border: "none", borderBottom: `1px solid ${th.border}`, color: "#f97316", fontSize: 14, fontWeight: 700, cursor: "pointer", textAlign: "left", fontFamily: "'Outfit',sans-serif", display: "flex", alignItems: "center", gap: 10 }}>
                                ⚠️ Şikayet Et
                            </button>
                            <button onClick={() => { setShowMenu(false); setShowBlockConfirm(true); }} style={{ width: "100%", padding: "13px 18px", background: "none", border: "none", color: "#f87171", fontSize: 14, fontWeight: 700, cursor: "pointer", textAlign: "left", fontFamily: "'Outfit',sans-serif", display: "flex", alignItems: "center", gap: 10 }}>
                                🚫 Engelle
                            </button>
                        </div>
                    )}
                    {/* Block confirmation popup */}
                    {showBlockConfirm && (
                        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
                            <div style={{ background: th.card, borderRadius: 20, padding: 24, width: "100%", maxWidth: 340, textAlign: "center" }}>
                                <div style={{ fontSize: 40, marginBottom: 12 }}>🚫</div>
                                <div style={{ fontWeight: 900, fontSize: 17, color: th.text, marginBottom: 8 }}>Engelle</div>
                                <div style={{ color: th.text3, fontSize: 13, lineHeight: 1.6, marginBottom: 20 }}>
                                    <b style={{ color: th.text }}>{team?.name}</b> engellenecek.<br />
                                    Sohbet mesajları silinecek ve bu takım Keşfet'te bir daha görünmeyecek.
                                </div>
                                <div style={{ display: "flex", gap: 10 }}>
                                    <button onClick={() => setShowBlockConfirm(false)} style={{ flex: 1, padding: "12px", borderRadius: 12, border: `1px solid ${th.border}`, background: "transparent", color: th.text4, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>Vazgeç</button>
                                    <button onClick={doBlock} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "none", background: "#f87171", color: "#fff", fontSize: 13, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>Engelle</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* Report modal */}
                    {showReport && (
                        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} onClick={() => { setShowReport(false); setReportReason(""); setReportDone(false); }}>
                            <div style={{ background: th.card, borderRadius: 20, padding: 24, width: "100%", maxWidth: 360 }} onClick={e => e.stopPropagation()}>
                                {reportDone ? (
                                    <div style={{ textAlign: "center", padding: "12px 0" }}>
                                        <div style={{ fontSize: 40, marginBottom: 10 }}>✅</div>
                                        <div style={{ color: "#4ade80", fontWeight: 800, fontSize: 16 }}>Şikayetiniz iletildi</div>
                                        <div style={{ color: th.text4, fontSize: 13, marginTop: 6 }}>FutMatch ekibi inceleyecek.</div>
                                    </div>
                                ) : (
                                    <>
                                        <div style={{ fontWeight: 900, fontSize: 17, color: th.text, marginBottom: 4 }}>⚠️ Şikayet Et</div>
                                        <div style={{ color: th.text4, fontSize: 12, marginBottom: 16 }}>{team?.name} · Sebep seç · Sohbet silinecek ve kullanıcı engellenecek</div>
                                        {["Küfür / Hakaret", "Sahtekarlık / Hile", "Spam / Sahte Maç", "Uygunsuz Davranış", "Diğer"].map(r => (
                                            <button key={r} onClick={() => setReportReason(r)} style={{ width: "100%", padding: "11px 14px", marginBottom: 8, borderRadius: 12, border: `1.5px solid ${reportReason === r ? "#f97316" : th.border}`, background: reportReason === r ? "rgba(249,115,22,.1)" : "transparent", color: reportReason === r ? "#f97316" : th.text3, fontSize: 13, fontWeight: reportReason === r ? 700 : 400, cursor: "pointer", textAlign: "left", fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>
                                                {r}
                                            </button>
                                        ))}
                                        <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                                            <button onClick={() => { setShowReport(false); setReportReason(""); }} style={{ flex: 1, padding: "11px", borderRadius: 12, border: `1px solid ${th.border}`, background: "transparent", color: th.text4, fontSize: 13, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>İptal</button>
                                            <button onClick={doReport} disabled={!reportReason} style={{ flex: 2, padding: "11px", borderRadius: 12, border: "none", background: reportReason ? "#f97316" : "#222", color: reportReason ? "#fff" : "#555", fontSize: 13, fontWeight: 700, cursor: reportReason ? "pointer" : "default", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>Şikayeti Gönder</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                    {/* Messages */}
                    <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
                        {msgs.map(msg => {
                            const isMe = msg.from === "me";
                            if (msg.type === "result_request") {
                                const isDisputed = match?.disputed && !match?.adminResolved && !match?.result;
                                const isAdminResolved = match?.adminResolved;
                                const resLbl = { win: "Galibiyet 🏆", loss: "Mağlubiyet 😞", draw: "Beraberlik 🤝" };
                                return (
                                    <div key={msg.id} style={{ background: isDisputed ? (dark ? "#1a0d00" : "#fff8f0") : isAdminResolved ? (dark ? "#0d0d1a" : "#f5f0ff") : (dark ? "#0d1a0d" : "#f0fff4"), border: `1px solid ${isDisputed ? "#f9731644" : isAdminResolved ? "#a78bfa44" : "#4ade8044"}`, borderRadius: 18, padding: "16px", margin: "8px 0" }}>
                                        <div style={{ color: isDisputed ? "#f97316" : isAdminResolved ? "#a78bfa" : "#4ade80", fontWeight: 800, fontSize: 14, marginBottom: 6 }}>
                                            {isDisputed ? "⚖️ İtirazlı Maç" : isAdminResolved ? "⚖️ Hakem Kararı" : "⚽ Maç Sonucu"}
                                        </div>
                                        {isDisputed && (
                                            <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.6 }}>
                                                Taraflar farklı sonuç bildirdi. FutMatch hakemi incelemeye aldı — karar size bildirilecek.
                                            </div>
                                        )}
                                        {isAdminResolved && (
                                            <div style={{ color: "#a78bfa", fontWeight: 700, fontSize: 13 }}>
                                                {resLbl[match?.result] || "Sonuç belirlendi"} — Hakem kararıyla uygulandı.
                                            </div>
                                        )}
                                        {!isDisputed && !isAdminResolved && (
                                            msg.myVote ? (
                                                <div style={{ textAlign: "center" }}>{msg.confirmed ? <div style={{ color: "#4ade80", fontWeight: 700 }}>{"✅"} Sonuç onaylandı!</div> : <div style={{ color: th.text4, fontSize: 12, animation: "pulse 1.5s infinite" }}>Rakip onayı bekleniyor…</div>}</div>
                                            ) : (
                                                <div>
                                                    <div style={{ color: th.text3, fontSize: 12, marginBottom: 10 }}>Maç sona erdi. Sonucu kaydedin.</div>
                                                    <div style={{ display: "flex", gap: 8 }}>
                                                        {[["🏆", "Kazandık", "win", "#4ade80"], ["🤝", "Beraberlik", "draw", th.text3], ["😞", "Kaybettik", "loss", "#f87171"]].map(([ic, lb, v, c]) => (
                                                            <button key={v} onClick={() => voteResult(chatId, msg.id, msg.matchId, v)} style={{ flex: 1, padding: "10px 4px", borderRadius: 12, border: `1px solid ${c}44`, background: `${c}12`, color: c, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
                                                                <div style={{ fontSize: 20, marginBottom: 4 }}>{ic}</div>{lb}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )
                                        )}
                                    </div>
                                );
                            }
                            if (msg.type === "match_invite") {
                                const p = msg.payload;
                                return (
                                    <div key={msg.id} style={{ alignSelf: "flex-start", maxWidth: "88%" }}>
                                        <div style={{ background: dark ? "#0d1400" : "#fffbe6", border: "1px solid #F5F23444", borderRadius: 18, padding: "14px" }}>
                                            <div style={{ color: "#F5F234", fontWeight: 800, fontSize: 13, marginBottom: 4 }}>📅 Maç Daveti</div>
                                            <div style={{ color: th.text2, fontSize: 13, marginBottom: 10, lineHeight: 1.5 }}>{msg.text.replace("📅 Maç Daveti: ", "")}</div>
                                            {!p.accepted && !p.rejected && !isMe && (
                                                <div style={{ display: "flex", gap: 8 }}>
                                                    <button onClick={() => acceptInvite(chatId, msg.id, p)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: "#4ade80", color: "#000", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>✅ Kabul</button>
                                                    <button onClick={() => rejectInvite(chatId, msg.id)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "1px solid #f87171", background: "transparent", color: "#f87171", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>❌ Reddet</button>
                                                </div>
                                            )}
                                            {p.accepted && <div style={{ color: "#4ade80", fontSize: 12, fontWeight: 700 }}>✅ Kabul edildi!</div>}
                                            {p.rejected && <div style={{ color: "#f87171", fontSize: 12, fontWeight: 700 }}>❌ Reddedildi</div>}
                                            {isMe && !p.accepted && !p.rejected && <div style={{ color: th.text4, fontSize: 11, animation: "pulse 1.5s infinite" }}>Yanıt bekleniyor…</div>}
                                        </div>
                                    </div>
                                );
                            }
                            return (
                                <div key={msg.id} style={{ display: "flex", justifyContent: isMe ? "flex-end" : "flex-start" }}>
                                    <div style={{ maxWidth: "75%", padding: "10px 14px", borderRadius: isMe ? "18px 18px 4px 18px" : "18px 18px 18px 4px", background: isMe ? th.acc : th.card, color: isMe ? th.accT : th.text, fontSize: 14, border: isMe ? "none" : `1px solid ${th.border}`, fontWeight: isMe ? 600 : 400 }}>
                                        {msg.text}
                                    </div>
                                </div>
                            );
                        })}
                        <div ref={endRef} />
                    </div>
                    {/* Invite panel */}
                    {showInvite && (
                        <div style={{ flexShrink: 0, padding: "14px 16px", borderTop: `1px solid ${th.border}`, background: th.bg4, animation: "slideDown .25s ease" }}>
                            <div style={{ fontWeight: 700, fontSize: 14, color: th.text, marginBottom: 12 }}>📅 Maç Tarihi Belirle</div>
                            {/* Day chips */}
                            <div style={{ color: th.text4, fontSize: 10, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>GÜN SEÇ</div>
                            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 12 }}>
                                {days.map(d => (
                                    <button key={d.iso} onClick={() => setSelDay(d)} style={{ flexShrink: 0, padding: "8px 14px", borderRadius: 12, border: `1.5px solid ${selDay?.iso === d.iso ? th.acc : th.border}`, background: selDay?.iso === d.iso ? `${th.acc}18` : "transparent", color: selDay?.iso === d.iso ? th.acc : th.text3, fontSize: 12, fontWeight: selDay?.iso === d.iso ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>
                                        <div style={{ fontSize: 10, marginBottom: 2 }}>{d.label}</div>
                                        <div style={{ fontWeight: 900 }}>{d.date.getDate()} {["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"][d.date.getMonth()]}</div>
                                    </button>
                                ))}
                            </div>
                            {/* Time chips */}
                            <div style={{ color: th.text4, fontSize: 10, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>SAAT SEÇ</div>
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                                {times.map(t => {
                                    const past = selDay && isPastSlot(selDay.iso, t);
                                    const active = selTime === t && !past;
                                    return (
                                        <button key={t} disabled={past} onClick={() => { if (!past) setSelTime(t); }}
                                            style={{ padding: "7px 12px", borderRadius: 10, border: `1.5px solid ${active ? th.acc : th.border}`, background: active ? `${th.acc}18` : "transparent", color: past ? th.text5 : active ? th.acc : th.text3, fontSize: 12, fontWeight: active ? 800 : 500, cursor: past ? "not-allowed" : "pointer", opacity: past ? 0.35 : 1, fontFamily: "'Outfit',sans-serif", transition: "all .15s" }}>
                                            {t}
                                        </button>
                                    );
                                })}
                            </div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <button onClick={() => setShowInvite(false)} style={{ flex: 1, padding: "11px", borderRadius: 12, border: `1px solid ${th.border}`, background: "transparent", color: th.text3, fontSize: 13, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>İptal</button>
                                <button onClick={sendInvite} disabled={!selDay} style={{ flex: 2, padding: "11px", borderRadius: 12, border: "none", background: selDay ? th.acc : "#222", color: selDay ? th.accT : "#555", fontSize: 13, fontWeight: 700, cursor: selDay ? "pointer" : "default", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>
                                    {selDay ? `${selDay.label} ${selDay.date.getDate()} — ${selTime} Davet Gönder 📨` : "Önce bir gün seç"}
                                </button>
                            </div>
                        </div>
                    )}
                    {/* Input */}
                    <div style={{ flexShrink: 0, padding: "10px 12px", borderTop: `1px solid ${th.border}`, background: th.nav, display: "flex", gap: 8, alignItems: "center" }}>
                        {!match?.confirmed && <button onClick={() => setShowInvite(v => !v)} style={{ padding: "0 12px", height: 44, borderRadius: 12, border: `1px solid ${showInvite ? th.acc : th.border}`, background: showInvite ? `${th.acc}15` : th.bg4, color: th.acc, fontSize: 18, cursor: "pointer", transition: "all .2s" }}>📅</button>}
                        <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Mesaj yaz…" style={{ flex: 1, padding: "10px 14px", borderRadius: 12, border: `1px solid ${th.border2}`, background: th.inp, color: th.text, fontSize: 14, outline: "none", fontFamily: "'Outfit',sans-serif" }} />
                        <button onClick={send} disabled={!text.trim()} style={{ padding: "0 16px", height: 44, borderRadius: 12, border: "none", background: text.trim() ? th.acc : "#1a1a1a", color: text.trim() ? th.accT : th.text4, fontSize: 15, fontWeight: 700, cursor: text.trim() ? "pointer" : "default", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>→</button>
                    </div>
                </div>
            );
        }
        // ── MATCHES TAB ───────────────────────────────────────────────────────
        function MatchesTab({ matches, chats, onChat, isPremium, th, dark }) {
            const resColor = { win: "#4ade80", loss: "#f87171", draw: th.text3 };
            const resLabel = { win: "🏆 Galibiyet", loss: "😞 Mağlubiyet", draw: "🤝 Beraberlik" };
            const sortedByDate = [...matches].sort((a, b) => {
                const tA = a.createdAt?.toDate?.() || new Date(a.createdAt || 0);
                const tB = b.createdAt?.toDate?.() || new Date(b.createdAt || 0);
                return tA - tB;
            });
            const firstMatchId = sortedByDate[0]?.id;
            const isLocked = (matchId) => !isPremium && matches.length > 1 && matchId !== firstMatchId;

            function getLastMsg(chatId) {
                const msgs = chats[chatId] || [];
                const textMsgs = msgs.filter(m => m.type !== "result_request");
                return textMsgs.length > 0 ? textMsgs[textMsgs.length - 1] : null;
            }

            function fmtTime(ts) {
                if (!ts) return "";
                const d = ts instanceof Date ? ts : new Date(ts);
                const now = new Date();
                const diff = now - d;
                if (diff < 60000) return "Şimdi";
                if (diff < 3600000) return Math.floor(diff / 60000) + "d";
                if (diff < 86400000) return d.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
                return d.toLocaleDateString("tr-TR", { day: "numeric", month: "short" });
            }

            const [showInfoBox, setShowInfoBox] = React.useState(true);
            return (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", background: th.bg }}>
                    {/* Header */}
                    <div style={{ padding: "16px 16px 12px", flexShrink: 0, borderBottom: `1px solid ${th.border}` }}>
                        <div style={{ fontFamily: "'Outfit',sans-serif", fontWeight: 900, fontSize: 24, color: th.text, letterSpacing: 2 }}>EŞLEŞMELERİM</div>
                        <div style={{ color: th.text4, fontSize: 12, marginTop: 3 }}>{matches.length} eşleşme · Sohbet etmeye başla</div>
                    </div>
                    {/* Pinned info box */}
                    {showInfoBox && (
                        <div style={{ margin: "10px 12px 0", padding: "12px 14px", borderRadius: 16, background: dark ? "rgba(245,242,52,0.06)" : "rgba(245,242,52,0.12)", border: "1px solid rgba(245,242,52,0.3)", position: "relative", flexShrink: 0 }}>
                            <button onClick={() => setShowInfoBox(false)} style={{ position: "absolute", top: 8, right: 10, background: "none", border: "none", color: th.text4, fontSize: 16, cursor: "pointer", lineHeight: 1 }}>×</button>
                            <div style={{ fontWeight: 800, fontSize: 13, color: th.acc, marginBottom: 6 }}>📅 Maç Daveti & Sonuç Sistemi</div>
                            <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.65 }}>
                                <b style={{ color: th.text2 }}>Maç Daveti:</b> Sohbet ekranında 📅 ikonuna tıkla, gün ve saat seç, davet gönder. Rakip kabul edince maç onaylanır.<br />
                                <b style={{ color: th.text2 }}>Sonuç Onaylama:</b> Maç saatinden sonra sonuç kartı açılır. Her iki takım da uygun sonucu seçerse istatistikler otomatik güncellenir.<br />
                                <b style={{ color: th.text2 }}>İtiraz:</b> Taraflar yanlış sonuç seçerse ⚖️ FutMatch hakemi devreye girer ve inceleme sonucu bildirilir.
                            </div>
                        </div>
                    )}
                    {/* Match list */}
                    <div style={{ flex: 1, overflowY: "auto", padding: "8px 12px 20px" }}>
                        {matches.length === 0 && (
                            <div style={{ textAlign: "center", paddingTop: 60 }}>
                                <div style={{ fontSize: 56, marginBottom: 16 }}>💬</div>
                                <div style={{ color: th.text2, fontWeight: 700, fontSize: 16, marginBottom: 8 }}>Henüz eşleşme yok</div>
                                <div style={{ color: th.text4, fontSize: 13, lineHeight: 1.6 }}>Keşfet ekranından takımları beğen,<br />karşılıklı beğeni olunca burada görünür!</div>
                            </div>
                        )}
                        {matches.map(m => {
                            const lastMsg = getLastMsg(m.chatId);
                            const isMe = lastMsg?.from === "me";
                            return (
                                <div key={m.id} onClick={() => onChat(m.chatId)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 10px", borderRadius: 18, marginBottom: 4, cursor: "pointer", background: th.card, border: `1px solid ${isLocked(m.id) ? "rgba(245,242,52,.3)" : th.border}`, transition: "opacity .15s", animation: "fadeUp .3s ease", opacity: isLocked(m.id) ? 0.75 : 1 }}>
                                    {/* Avatar */}
                                    <div style={{ position: "relative", flexShrink: 0 }}>
                                        <div style={{ width: 52, height: 52, borderRadius: 16, background: th.bg4, border: `2px solid ${m.confirmed ? "#4ade8044" : "#f9731644"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>{m.team.logo}</div>
                                        {!m.result && <div style={{ position: "absolute", bottom: -2, right: -2, width: 12, height: 12, borderRadius: 6, background: m.confirmed ? "#4ade80" : "#f97316", border: `2px solid ${th.card}` }} />}
                                        {isLocked(m.id) && <div style={{ position: "absolute", top: -4, right: -4, width: 18, height: 18, borderRadius: "50%", background: "#F5F234", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>🔒</div>}
                                    </div>
                                    {/* Info */}
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                                            <div style={{ color: th.text, fontWeight: 700, fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.team.name}</div>
                                            {isLocked(m.id) ? <div style={{ color: th.acc, fontSize: 10, fontWeight: 700, flexShrink: 0 }}>⚡ Premium</div> : lastMsg && <div style={{ color: th.text4, fontSize: 10, flexShrink: 0, marginLeft: 8 }}>{fmtTime(lastMsg.ts)}</div>}
                                        </div>
                                        {lastMsg ? (
                                            <div style={{ color: th.text4, fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                                {isMe && <span style={{ color: th.acc, fontWeight: 600 }}>Sen: </span>}
                                                {lastMsg.type === "match_invite" ? "📅 Maç daveti" : lastMsg.text}
                                            </div>
                                        ) : (
                                            <div style={{ color: m.confirmed ? th.text4 : "#f97316", fontSize: 12, fontStyle: "italic" }}>
                                                {m.confirmed ? "Henüz mesaj yok — ilk sen yaz!" : "⏳ Tarih belirlenmedi"}
                                            </div>
                                        )}
                                        {m.adminResolved && m.result && <div style={{ color: "#a78bfa", fontSize: 10, marginTop: 2, fontWeight: 700 }}>⚖️ Hakem Kararı · {resLabel[m.result]}</div>}
                                        {!m.adminResolved && m.result && <div style={{ color: resColor[m.result], fontSize: 10, marginTop: 2, fontWeight: 700 }}>{resLabel[m.result]}</div>}
                                        {m.disputed && !m.result && <div style={{ color: "#f97316", fontSize: 10, marginTop: 2, fontWeight: 700 }}>⚖️ İtirazlı — İnceleniyor</div>}
                                        {!m.disputed && m.confirmed && m.scheduledTime && !m.result && (
                                            <div style={{ color: "#4ade80", fontSize: 10, marginTop: 2 }}>🗓 {new Date(m.scheduledTime).toLocaleString("tr-TR", { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</div>
                                        )}
                                    </div>
                                    {/* Arrow */}
                                    <span style={{ color: th.text4, fontSize: 18, flexShrink: 0 }}>›</span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
        // ── LEADERBOARD ───────────────────────────────────────────────────────
        function LeaderTab({ me, all, th, dark }) {
            const [filter, setFilter] = React.useState("all");
            const medals = ["🥇", "🥈", "🥉"];
            const cityBoard = all.filter(t => t.city && t.city === me?.city);
            const board = filter === "city" ? cityBoard : all;
            const myPos = all.findIndex(t => t.id === (me?.id)) + 1;
            const inTop8 = myPos >= 1 && myPos <= 8;
            return (
                <div style={{ flex: 1, overflowY: "auto", background: th.bg }}>
                    {/* FutCup Banner */}
                    <div style={{ margin: "14px 14px 0", padding: "14px 16px", borderRadius: 18, background: dark ? "linear-gradient(135deg,rgba(245,242,52,.1),rgba(245,242,52,.03))" : "linear-gradient(135deg,#fffef0,#fffbe6)", border: "1.5px solid rgba(245,242,52,.4)", display: "flex", gap: 12, alignItems: "center" }}>
                        <div style={{ fontSize: 32, flexShrink: 0 }}>🏆</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ color: th.acc, fontWeight: 800, fontSize: 14, marginBottom: 4 }}>FutCup Turnuvası</div>
                            <div style={{ color: th.text4, fontSize: 12, lineHeight: 1.55 }}>Genel sıralamada <span style={{ color: th.acc, fontWeight: 700 }}>ilk 8 takım</span> sezon sonu FutCup Turnuvası'na katılım hakkı kazanır!</div>
                        </div>
                        <div style={{ flexShrink: 0, textAlign: "center" }}>
                            <div style={{ color: inTop8 ? "#4ade80" : "#f87171", fontWeight: 800, fontSize: 11 }}>{inTop8 ? "İÇERİDE!" : "#" + myPos}</div>
                            <div style={{ color: th.text4, fontSize: 9, marginTop: 2 }}>{inTop8 ? "Hakkı kazandın" : "Daha var"}</div>
                        </div>
                    </div>
                    {/* Filter tabs */}
                    <div style={{ display: "flex", margin: "12px 14px 0", background: th.bg4, borderRadius: 12, padding: 3, border: `1px solid ${th.border}` }}>
                        {[["all", "🌍  Genel"], ["city", `📍  ${me?.city || "Şehrim"}`]].map(([k, l]) => (
                            <button key={k} onClick={() => setFilter(k)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: filter === k ? th.acc : "transparent", color: filter === k ? th.accT : th.text4, fontSize: 12, fontWeight: filter === k ? 800 : 500, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>{l}</button>
                        ))}
                    </div>
                    {filter === "city" && cityBoard.length === 0 && (
                        <div style={{ textAlign: "center", padding: "32px 20px", color: th.text4, fontSize: 13 }}>Bu şehirde henüz başka kayıtlı takım yok.</div>
                    )}
                    {/* ── PODIUM ── */}
                    {board.length >= 3 && (
                        <div style={{ margin: "16px 0 0", animation: "fadeUp .5s ease" }}>
                            {/* ambient glow bg */}
                            <div style={{ position: "relative", background: dark ? "linear-gradient(180deg,rgba(255,215,0,.04) 0%,transparent 100%)" : "linear-gradient(180deg,rgba(255,215,0,.06) 0%,transparent 100%)", padding: "20px 14px 0" }}>
                                <div style={{ color: th.text4, fontSize: 9, letterSpacing: 3, fontWeight: 800, textAlign: "center", marginBottom: 20 }}>🏆 SEZON PODYUMU</div>
                                {/* podium row — players float above columns */}
                                <div style={{ display: "flex", alignItems: "flex-end", gap: 6 }}>

                                    {/* ── 2nd place ── */}
                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", animation: "fadeUp .5s .1s ease both" }}>
                                        {/* avatar bubble */}
                                        <div style={{ width: 52, height: 52, borderRadius: 16, background: dark ? "#1a1a1a" : "#f0f0f0", border: "2px solid #C0C0C0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 6, boxShadow: dark ? "0 0 18px rgba(192,192,192,.2)" : "0 4px 16px rgba(0,0,0,.1)", animation: "heartbeat 2.2s ease infinite" }}>{board[1].logo}</div>
                                        <div style={{ color: "#C0C0C0", fontWeight: 900, fontSize: 11, textAlign: "center", maxWidth: 72, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{board[1].name}</div>
                                        <div style={{ color: dark ? "#777" : "#999", fontWeight: 700, fontSize: 10, marginBottom: 8 }}>{board[1].points} puan</div>
                                        {/* column */}
                                        <div style={{ width: "100%", height: 72, borderRadius: "12px 12px 0 0", position: "relative", overflow: "hidden", background: dark ? "linear-gradient(180deg,#323232 0%,#1e1e1e 100%)" : "linear-gradient(180deg,#e8e8e8 0%,#bdbdbd 100%)", boxShadow: dark ? "inset 0 1px 0 rgba(255,255,255,.08), 0 -2px 16px rgba(192,192,192,.12)" : "inset 0 1px 0 rgba(255,255,255,.8), 0 -2px 12px rgba(0,0,0,.08)" }}>
                                            <div style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%)" }} />
                                            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                                                <div style={{ fontSize: 20 }}>🥈</div>
                                                <div style={{ color: dark ? "rgba(192,192,192,.8)" : "rgba(100,100,100,.9)", fontSize: 13, fontWeight: 900, letterSpacing: 1 }}>2</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* ── 1st place ── */}
                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", animation: "fadeUp .5s 0s ease both" }}>
                                        {/* crown */}

                                        <div style={{ color: "#FFD700", fontWeight: 900, fontSize: 12, textAlign: "center", maxWidth: 82, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{board[0].name}</div>
                                        <div style={{ color: dark ? "#aa8800" : "#b8860b", fontWeight: 700, fontSize: 10, marginBottom: 8 }}>{board[0].points} puan</div>

                                        <div style={{ width: "100%", height: 108, borderRadius: "12px 12px 0 0", position: "relative", overflow: "hidden", background: dark ? "linear-gradient(180deg,#3d3200 0%,#252000 100%)" : "linear-gradient(180deg,#ffe566 0%,#d4a017 100%)", boxShadow: dark ? "inset 0 1px 0 rgba(255,215,0,.15), 0 -4px 28px rgba(255,215,0,.2)" : "inset 0 1px 0 rgba(255,255,255,.6), 0 -4px 24px rgba(255,215,0,.35)" }}>
                                            <div style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%)" }} />
                                            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                                                <div style={{ fontSize: 26 }}>🥇</div>
                                                <div style={{ color: dark ? "rgba(255,215,0,.9)" : "rgba(120,90,0,.9)", fontSize: 16, fontWeight: 900, letterSpacing: 1 }}>1</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* ── 3rd place ── */}
                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", animation: "fadeUp .5s .2s ease both" }}>
                                        {/* avatar bubble */}
                                        <div style={{ width: 52, height: 52, borderRadius: 16, background: dark ? "#1a1208" : "#fff3e8", border: "2px solid #CD7F32", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 6, boxShadow: dark ? "0 0 18px rgba(205,127,50,.2)" : "0 4px 16px rgba(205,127,50,.25)", animation: "heartbeat 2.6s ease infinite" }}>{board[2].logo}</div>
                                        <div style={{ color: "#CD7F32", fontWeight: 900, fontSize: 11, textAlign: "center", maxWidth: 72, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{board[2].name}</div>
                                        <div style={{ color: dark ? "#7a5020" : "#a0622a", fontWeight: 700, fontSize: 10, marginBottom: 8 }}>{board[2].points} puan</div>
                                        {/* column */}
                                        <div style={{ width: "100%", height: 48, borderRadius: "12px 12px 0 0", position: "relative", overflow: "hidden", background: dark ? "linear-gradient(180deg,#2e1c0a 0%,#1a1008 100%)" : "linear-gradient(180deg,#e8a060 0%,#b5611a 100%)", boxShadow: dark ? "inset 0 1px 0 rgba(205,127,50,.1), 0 -2px 16px rgba(205,127,50,.1)" : "inset 0 1px 0 rgba(255,255,255,.5), 0 -2px 12px rgba(205,127,50,.2)" }}>
                                            <div style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%)" }} />
                                            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                                                <div style={{ fontSize: 18 }}>🥉</div>
                                                <div style={{ color: dark ? "rgba(205,127,50,.8)" : "rgba(120,60,10,.8)", fontSize: 11, fontWeight: 900, letterSpacing: 1 }}>3</div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                                {/* base platform */}
                                <div style={{ height: 6, background: dark ? "linear-gradient(90deg,#111,#1e1e1e,#111)" : "linear-gradient(90deg,#e0e0e0,#f5f5f5,#e0e0e0)", borderTop: dark ? "1px solid #2a2a2a" : "1px solid #ccc" }} />
                            </div>
                        </div>
                    )}
                    <div style={{ padding: "10px 14px 0" }}>
                        {board.map((t, i) => {
                            const isMe = t.id === me?.id;
                            const rnk = getRank(t.points || 0);
                            const inCup = i < 8 && filter === "all";
                            return (
                                <div key={t.id || i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px", borderRadius: 14, marginBottom: 6, background: isMe ? `${th.acc}14` : inCup ? `${th.acc}06` : th.card, border: `1px solid ${isMe ? th.acc : inCup ? "rgba(245,242,52,.2)" : th.border}`, animation: "fadeUp .3s ease", animationDelay: `${i * .025}s` }}>
                                    <div style={{ width: 30, textAlign: "center", fontWeight: 900, fontSize: i < 3 ? 20 : 13, color: i < 3 ? th.acc : th.text4 }}>{i < 3 ? medals[i] : `#${i + 1}`}</div>
                                    <div style={{ fontSize: 24 }}>{t.logo}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ color: isMe ? th.acc : th.text, fontWeight: isMe ? 800 : 600, fontSize: 13 }}>{t.name || "Takımım"}{isMe ? " (Sen)" : ""}</div>
                                        <div style={{ color: th.text4, fontSize: 10, marginTop: 1 }}>📍 {t.city}{t.district ? ` · ${t.district}` : ""}</div>
                                    </div>
                                    <div style={{ textAlign: "right" }}>
                                        {inCup && <div style={{ fontSize: 9, color: th.acc, fontWeight: 700, marginBottom: 2, letterSpacing: .5 }}>🏆 FUTCUP</div>}
                                        <div style={{ color: rnk.color, fontSize: 11, marginBottom: 1 }}>{rnk.icon}</div>
                                        <div style={{ fontWeight: 800, fontSize: 17, color: th.text, letterSpacing: -0.5 }}>{t.points || 0}</div>
                                    </div>
                                </div>
                            );
                        })}
                        <div style={{ height: 24 }} />
                    </div>
                </div>
            );
        }
        // -- PROFILE TAB --
        function ProfileTab({ me, rnk, prog, nextRnk, setShowPrem, updateMe, toggleDay, th, dark, setDark }) {
            const [editing, setEditing] = React.useState(false);
            const [editName, setEditName] = React.useState(me.name);
            const [editDesc, setEditDesc] = React.useState(me.desc || "");
            const [editLogo, setEditLogo] = React.useState(me.logo || "⚽");
            const [showLogoPicker, setShowLogoPicker] = React.useState(false);
            const [showSettings, setShowSettings] = React.useState(false);
            const [saveErr, setSaveErr] = React.useState("");

            React.useEffect(() => {
                if (!editing) {
                    setEditName(me.name);
                    setEditDesc(me.desc || "");
                    setEditLogo(me.logo || "⚽");
                }
            }, [me?.name, me?.desc, me?.logo, editing]);

            function cycleLogo(dir) {
                const list = Array.isArray(LOGOS) && LOGOS.length ? LOGOS : ["⚽"];
                const cur = editing ? (editLogo || me.logo) : (me.logo || editLogo);
                const idx = Math.max(0, list.indexOf(cur));
                const next = list[(idx + (dir === "prev" ? -1 : 1) + list.length) % list.length];
                if (editing) setEditLogo(next);
                else updateMe({ logo: next });
            }

            const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;
            const nameEditedAt = me.nameEditedAt || 0;
            const nameLockedUntil = nameEditedAt + ONE_WEEK_MS;
            const nameLocked = Date.now() < nameLockedUntil;
            const nameLockDaysLeft = Math.ceil((nameLockedUntil - Date.now()) / (24 * 60 * 60 * 1000));

            function save() {
                const name = editName.trim() || me.name;
                const nameChanged = name !== me.name;
                if (nameChanged && nameLocked) { setSaveErr(`Takım adı ${nameLockDaysLeft} gün sonra tekrar değiştirilebilir.`); return; }
                if (hasProfanity(name)) { setSaveErr("Takım adı uygunsuz içerik barındırıyor."); return; }
                if (hasProfanity(editDesc)) { setSaveErr("Açıklama uygunsuz içerik barındırıyor."); return; }
                setSaveErr("");
                const updates = { desc: editDesc.trim(), logo: editLogo || me.logo || "⚽" };
                if (nameChanged) { updates.name = name; updates.nameEditedAt = Date.now(); }
                updateMe(updates);
                setEditing(false);
                setShowLogoPicker(false);
            }
            const wr = me.played > 0 ? Math.round(me.wins / me.played * 100) : 0;
            return (
                <div style={{ flex: 1, overflowY: "auto", background: th.bg }}>
                    {showSettings && <SettingsModal th={th} dark={dark} setDark={setDark} onClose={() => setShowSettings(false)} />}
                    <div style={{ padding: "14px 16px 0" }}>
                        <div style={{ background: th.hGrad, border: `1px solid ${th.hBord}`, borderRadius: 22, padding: "20px", marginBottom: 14, position: "relative", overflow: "hidden" }}>
                            <div style={{ position: "absolute", inset: 0, backgroundImage: `radial-gradient(circle at 80% 20%, ${th.acc}12 0%, transparent 60%)`, pointerEvents: "none" }} />
                            <button onClick={() => setShowSettings(true)} style={{ position: "absolute", top: 14, right: 14, width: 36, height: 36, borderRadius: 12, border: `1px solid ${th.border}`, background: th.bg4, color: th.text3, fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2 }}>{"⚙️"}</button>
                            <div style={{ display: "flex", gap: 14, alignItems: "center", position: "relative" }}>
                                <button
                                    onClick={() => setShowLogoPicker(true)}
                                    title="Logo değiştir"
                                    style={{ fontSize: 52, width: 70, height: 70, borderRadius: 18, background: th.bg4, border: `1px solid ${th.hBord}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer", padding: 0 }}
                                >
                                    {editing ? editLogo : me.logo}
                                </button>
                                <div style={{ flex: 1, minWidth: 0, paddingRight: 44 }}>
                                    {editing ? (
                                        <div>
                                            <input value={editName} onChange={e => !nameLocked && setEditName(e.target.value)} readOnly={nameLocked} style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: `1px solid ${nameLocked ? th.border : th.border2}`, background: nameLocked ? th.bg4 : th.inp, color: nameLocked ? th.text4 : th.text, fontSize: 16, outline: "none", fontFamily: "'Outfit',sans-serif", marginBottom: 4, cursor: nameLocked ? "not-allowed" : "text" }} />
                                            {nameLocked && <div style={{ color: th.text4, fontSize: 10, marginBottom: 4 }}>🔒 Takım adı {nameLockDaysLeft} gün sonra değiştirilebilir</div>}
                                        </div>
                                    ) : (
                                        <div style={{ fontWeight: 900, fontSize: 22, color: th.text, marginBottom: 2 }}>{me.name}</div>
                                    )}
                                    <div style={{ color: th.text4, fontSize: 12 }}>{"📍"} {me.city} · {me.district}</div>
                                    <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                                        <span style={{ padding: "2px 8px", borderRadius: 20, border: `1px solid ${rnk.color}`, color: rnk.color, fontSize: 11 }}>{rnk.icon} {rnk.label}</span>
                                        {me.isPremium && <span style={{ padding: "2px 8px", borderRadius: 20, background: "rgba(245,242,52,.15)", border: "1px solid rgba(245,242,52,.4)", color: th.acc, fontSize: 11 }}>{"⚡"} PRO</span>}
                                    </div>
                                </div>
                            </div>
                            {showLogoPicker && (
                                <div style={{ marginTop: 14, padding: "14px", borderRadius: 16, border: `1px solid ${th.border}`, background: dark ? "rgba(0,0,0,.18)" : "rgba(255,255,255,.5)" }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, gap: 10 }}>
                                        <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1.5, fontWeight: 700 }}>TAKIM LOGOSU</div>
                                        <div style={{ display: "flex", gap: 6 }}>
                                            <button onClick={() => cycleLogo("prev")} style={{ padding: "6px 10px", borderRadius: 10, border: `1px solid ${th.border}`, background: th.bg4, color: th.text3, fontSize: 12, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>←</button>
                                            <button onClick={() => cycleLogo("next")} style={{ padding: "6px 10px", borderRadius: 10, border: `1px solid ${th.border}`, background: th.bg4, color: th.text3, fontSize: 12, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>→</button>
                                            <button onClick={() => setShowLogoPicker(false)} style={{ padding: "6px 10px", borderRadius: 10, border: `1px solid ${th.border}`, background: "transparent", color: th.text4, fontSize: 12, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>Kapat</button>
                                        </div>
                                    </div>
                                    <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8 }}>
                                        {(Array.isArray(LOGOS) ? LOGOS : ["⚽"]).map(l => {
                                            const cur = editing ? editLogo : me.logo;
                                            const active = cur === l;
                                            return (
                                                <button
                                                    key={l}
                                                    onClick={() => {
                                                        if (editing) setEditLogo(l);
                                                        else { updateMe({ logo: l }); setShowLogoPicker(false); }
                                                    }}
                                                    style={{ width: "100%", aspectRatio: "1 / 1", borderRadius: 12, border: `2px solid ${active ? th.acc : th.border2}`, background: active ? `${th.acc}12` : th.bg4, fontSize: 22, cursor: "pointer", transition: "all .15s" }}
                                                >
                                                    {l}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {editing && <div style={{ color: th.text5, fontSize: 10, marginTop: 10 }}>Seçtiğin logo, <b>Kaydet</b> dediğinde güncellenir.</div>}
                                </div>
                            )}
                            {editing && <>
                                <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1.5, fontWeight: 700, margin: "12px 0 6px" }}>TAKIM TANITIMI</div>
                                <textarea value={editDesc} onChange={e => setEditDesc(e.target.value)} rows={2} maxLength={200} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${th.border2}`, background: th.inp, color: th.text, fontSize: 13, outline: "none", fontFamily: "'Outfit',sans-serif", resize: "none", lineHeight: 1.5 }} />
                            </>}
                            {!editing && me.desc && <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.6, marginTop: 10, fontStyle: "italic" }}>"{me.desc}"</div>}
                            <div style={{ marginTop: 14 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                    <span style={{ color: th.text4, fontSize: 10, fontWeight: 600 }}>{me.points || 0} PUAN</span>
                                    {nextRnk && <span style={{ color: th.text4, fontSize: 10 }}>{"→"} {nextRnk.label} ({nextRnk.min})</span>}
                                </div>
                                <div style={{ height: 4, background: th.border, borderRadius: 2, overflow: "hidden" }}>
                                    <div style={{ height: "100%", width: `${prog}%`, background: `linear-gradient(90deg,${th.acc},${dark ? "#fff" : "#222"})`, borderRadius: 2, transition: "width .5s ease" }} />
                                </div>
                            </div>
                            {saveErr && editing && <div style={{ color: "#f87171", fontSize: 11, marginTop: 8, fontWeight: 600 }}>⚠️ {saveErr}</div>}
                            <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                                <button onClick={() => { if (editing) save(); else setEditing(true); }} style={{ flex: 1, padding: "9px", borderRadius: 11, border: `1px solid ${th.border}`, background: editing ? th.acc : th.bg4, color: editing ? th.accT : th.text3, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .2s" }}>{editing ? "✓ Kaydet" : "✏️ Düzenle"}</button>
                                {editing && <button onClick={() => { setEditing(false); setShowLogoPicker(false); setSaveErr(""); }} style={{ flex: 1, padding: "9px", borderRadius: 11, border: `1px solid ${th.border}`, background: "transparent", color: th.text4, fontSize: 12, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>{"İptal"}</button>}
                            </div>
                        </div>
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, marginBottom: 14, overflow: "hidden" }}>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr" }}>
                                {[["G", me.wins || 0, "#4ade80"], ["B", me.draws || 0, th.text3], ["M", me.losses || 0, "#f87171"], ["Oran", `%${wr}`, th.acc]].map(([l, v, c], i) => (
                                    <div key={l} style={{ padding: "14px 8px", textAlign: "center", borderRight: i < 3 ? `1px solid ${th.border}` : "" }}>
                                        <div style={{ fontWeight: 900, fontSize: 24, color: c }}>{v}</div>
                                        <div style={{ color: th.text4, fontSize: 10, letterSpacing: 1, marginTop: 2 }}>{l}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, padding: "16px", marginBottom: 14 }}>
                            <SecTit th={th}>UYGUN GÜNLER</SecTit>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                                {DAYS.map(d => {
                                    const active = me.avail?.includes(d); return (
                                        <button key={d} onClick={() => toggleDay(d)} style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${active ? th.acc : th.border2}`, color: active ? th.acc : th.text4, fontSize: 12, fontWeight: active ? 700 : 400, background: active ? `${th.acc}12` : "transparent", cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all .18s" }}>{d}</button>
                                    );
                                })}
                            </div>
                        </div>
                        {!me.isPremium && (
                            <button onClick={() => setShowPrem(true)} style={{ width: "100%", marginBottom: 24, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg,#F5F234,#FFD700)", color: "#000", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
                                {"⚡"} Premium'a Geç — ₺99/ay
                            </button>
                        )}
                        <div style={{ background: th.card, border: `1px solid ${th.border}`, borderRadius: 18, padding: "14px 16px", marginTop: -10, marginBottom: 18 }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 8 }}>
                                <div style={{ color: th.text, fontWeight: 900, fontSize: 12, letterSpacing: 1.2 }}>📌 PUANLAMA</div>
                                <div style={{ color: th.text5, fontSize: 10 }}>Güncel sistem</div>
                            </div>
                            <div style={{ color: th.text3, fontSize: 12, lineHeight: 1.65 }}>
                                <div><b>🏆 Galibiyet:</b> +100</div>
                                <div><b>🤝 Beraberlik:</b> her iki takıma +50</div>
