name: Firebase Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Hosting deploy (action-hosting-deploy çalıştığı kanıtlanmış) ──────
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: futmatch1-e21d5

      # ── Firestore rules deploy (Firebase Security Rules REST API) ─────────
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcloud-key.json

      - name: Install Python deps
        run: pip3 install google-auth requests

      - name: Deploy Firestore Rules via REST API
        run: |
          python3 << 'EOF'
          import google.auth, google.auth.transport.requests, json, requests, sys

          creds, _ = google.auth.load_credentials_from_file(
              '/tmp/gcloud-key.json',
              scopes=['https://www.googleapis.com/auth/cloud-platform']
          )
          creds.refresh(google.auth.transport.requests.Request())
          token = creds.token
          project = 'futmatch1-e21d5'
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

          with open('firestore.rules') as f:
              rules_content = f.read()

          # Yeni ruleset oluştur
          r = requests.post(
              f'https://firebaserules.googleapis.com/v1/projects/{project}/rulesets',
              headers=headers,
              json={'source': {'files': [{'name': 'firestore.rules', 'content': rules_content}]}}
          )
          if not r.ok:
              print('Ruleset oluşturma hatası:', r.text); sys.exit(1)

          ruleset_name = r.json()['name']

          # Cloud Firestore release'ini güncelle
          r2 = requests.patch(
              f'https://firebaserules.googleapis.com/v1/projects/{project}/releases/cloud.firestore',
              headers=headers,
              json={'rulesetName': ruleset_name}
          )
          if not r2.ok:
              print('Release güncelleme hatası:', r2.text); sys.exit(1)

          print('✅ Firestore rules başarıyla deploy edildi:', ruleset_name)
          EOF
