name: Firebase Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcloud-key.json

      - name: Deploy Hosting + Firestore Rules
        run: firebase deploy --only hosting,firestore:rules --project futmatch1-e21d5
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud-key.json
